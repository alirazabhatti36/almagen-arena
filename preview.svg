    <text x="36" y="35" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#06131d">Play Instantly</text>
  </g>
  <g transform="translate(560 468)">
    <rect width="188" height="54" rx="27" fill="#ffd93d"/>
    <text x="35" y="35" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#231500">Family Safe</text>
