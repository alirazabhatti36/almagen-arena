<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Quest - AlMaGen Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; padding: 10px 20px; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #a29bfe; }
        canvas { border: 2px solid #6c5ce7; border-radius: 10px; box-shadow: 0 0 30px rgba(108, 92, 231, 0.3); max-width: 95vw; max-height: 70vh; cursor: pointer; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.5rem; color: #a29bfe; margin-bottom: 10px; }
        #gameOverScreen p { color: #fff; font-size: 1rem; margin-bottom: 10px; text-align: center; padding: 0 20px; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #6c5ce7; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .play-again-btn:hover { background: #5a4bd1; transform: scale(1.05); }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <div class="stat-box"><div class="stat-label">⭐ Score</div><div class="stat-value" id="scoreDisplay">0</div></div>
            <div class="stat-box"><div class="stat-label">🔥 Best</div><div class="stat-value" id="bestDisplay">0</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2>💫 Safar Complete!</h2><p id="gameOverMsg"></p>
            <div style="color:#a29bfe;font-size:1.5rem;margin-bottom:15px;">Score: <span id="finalScore" style="font-weight:bold;">0</span></div>
            <button class="play-again-btn" onclick="startGame()">🔄 Play Again</button>
        </div>
    </div>
    <p class="instructions">🖱️ Click/Hold & Drag | 👆 Touch & Drag | Control the ball through gaps!</p>

    <script src="../js/soundengine.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { canvas.width = Math.min(window.innerWidth - 30, 500); canvas.height = Math.min(window.innerHeight - 230, 650); }
        setCanvasSize(); window.addEventListener('resize', setCanvasSize);
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }

        let ball = { x: 0, y: 0, radius: 16, vx: 0, vy: 0 };
        let obstacles = [], particles = [], score = 0, bestScore = 0, gameRunning = true, gameStarted = false, frameCount = 0;
        let mouseDown = false, mouseX = 0, mouseY = 0, targetX = 0, targetY = 0, trailPoints = [];
        let gravity = 0.4, difficulty = 1;
        const colors = ['#6c5ce7','#a29bfe','#00d4ff','#00ff88','#ffd93d','#ff6b6b'];
        let currentColor = colors[0];

        class Obstacle {
            constructor() {
                this.x = Math.random()*(canvas.width-120)+60; this.y = -80;
                this.width = 50+Math.random()*40; this.height = 18+Math.random()*10;
                this.speed = 2+Math.random()*2+difficulty*0.3; this.color = colors[Math.floor(Math.random()*colors.length)];
                this.rotation = Math.random()*0.4-0.2; this.rotSpeed = (Math.random()-0.5)*0.02; this.passed = false;
                this.hasGap = Math.random()<0.3; this.gapPosition = Math.random()*0.6+0.2; this.gapSize = 35+Math.random()*25;
            }
            update() { this.y += this.speed; this.rotation += this.rotSpeed; }
            draw() {
                ctx.save(); ctx.translate(this.x+this.width/2, this.y+this.height/2); ctx.rotate(this.rotation);
                if(this.hasGap) {
                    const gs = this.width*this.gapPosition-this.gapSize/2, ge = this.width*this.gapPosition+this.gapSize/2;
                    ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=8;
                    ctx.beginPath(); ctx.roundRect(-this.width/2,-this.height/2,gs+this.width/2,this.height,6); ctx.fill();
                    ctx.beginPath(); ctx.roundRect(ge-this.width/2,-this.height/2,this.width/2-ge,this.height,6); ctx.fill();
                    ctx.shadowBlur=0;
                } else {
                    ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=8;
                    ctx.beginPath(); ctx.roundRect(-this.width/2,-this.height/2,this.width,this.height,6); ctx.fill(); ctx.shadowBlur=0;
                }
                ctx.restore();
            }
            isOffScreen() { return this.y > canvas.height+100; }
            checkCollision(ball) {
                if(this.hasGap) {
                    const gs=this.x+this.width*this.gapPosition-this.gapSize/2, ge=this.x+this.width*this.gapPosition+this.gapSize/2;
                    if(ball.x>gs+ball.radius && ball.x<ge-ball.radius) return false;
                }
                const cx=Math.max(this.x,Math.min(ball.x,this.x+this.width)), cy=Math.max(this.y,Math.min(ball.y,this.y+this.height));
                return (ball.x-cx)*(ball.x-cx)+(ball.y-cy)*(ball.y-cy) < ball.radius*ball.radius;
            }
        }

        class Particle {
            constructor(x,y,color) { this.x=x;this.y=y;this.vx=(Math.random()-0.5)*5;this.vy=(Math.random()-0.5)*5;this.life=1;this.decay=0.025;this.color=color;this.size=Math.random()*4+2; }
            update() { this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vy+=0.05; }
            draw() { ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1; }
        }
        function spawnParticles(x,y,color,count=15) { for(let i=0;i<count;i++) particles.push(new Particle(x,y,color)); }

        function startGame() {
            ball.x=canvas.width/2; ball.y=canvas.height*0.8; ball.vx=0; ball.vy=0;
            obstacles=[]; particles=[]; trailPoints=[]; score=0; gameRunning=true; gameStarted=false;
            frameCount=0; mouseDown=false; difficulty=1; currentColor=colors[Math.floor(Math.random()*colors.length)];
            targetX=ball.x; targetY=ball.y;
            document.getElementById('gameOverScreen').style.display='none'; document.getElementById('scoreDisplay').textContent='0';
            const saved=localStorage.getItem('safarBestScore'); bestScore=saved?parseInt(saved):0;
            document.getElementById('bestDisplay').textContent=bestScore;
        }
        function gameOver(msg) {
            sound.playCrash(); gameRunning=false; spawnParticles(ball.x,ball.y,'#ff6b6b',25);
            if(score>bestScore){bestScore=score;localStorage.setItem('safarBestScore',bestScore);}
            document.getElementById('finalScore').textContent=score; document.getElementById('bestDisplay').textContent=bestScore;
            document.getElementById('gameOverMsg').textContent=msg; document.getElementById('gameOverScreen').style.display='flex';
            const pn=localStorage.getItem('almagen_name')||'Player';
            localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'ball',name:pn,score:score,date:new Date().toISOString()}));
            if(typeof updateDailyProgress==='function')updateDailyProgress('ball',score);
        }
        function update() {
            if(!gameRunning)return; frameCount++; difficulty=1+Math.floor(frameCount/400);
            if(mouseDown){targetX=mouseX;targetY=mouseY;if(!gameStarted)gameStarted=true;}
            if(gameStarted){
                const dx=targetX-ball.x,dy=targetY-ball.y,dist=Math.sqrt(dx*dx+dy*dy);
                if(dist>5){ball.vx+=dx*0.08;ball.vy+=dy*0.08;}
                ball.vy+=gravity; ball.vx*=0.98; ball.vy*=0.98;
                const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy); if(spd>8){ball.vx=(ball.vx/spd)*8;ball.vy=(ball.vy/spd)*8;}
                ball.x+=ball.vx; ball.y+=ball.vy;
                if(ball.x-ball.radius<0){ball.x=ball.radius;ball.vx*=-0.5;}
                if(ball.x+ball.radius>canvas.width){ball.x=canvas.width-ball.radius;ball.vx*=-0.5;}
                if(ball.y-ball.radius<0){ball.y=ball.radius;ball.vy*=-0.5;}
                trailPoints.push({x:ball.x,y:ball.y,life:1}); if(trailPoints.length>20)trailPoints.shift();
            }
            const spawnRate=Math.max(25,55-difficulty*3);
            if(frameCount%spawnRate===0&&gameStarted)obstacles.push(new Obstacle());
            for(let i=obstacles.length-1;i>=0;i--){
                obstacles[i].update();
                if(obstacles[i].checkCollision(ball)&&gameStarted){gameOver('Ball crashed! Gravity is tricky!');return;}
                if(!obstacles[i].passed&&obstacles[i].y>ball.y+ball.radius){obstacles[i].passed=true;sound.playScore();score++;document.getElementById('scoreDisplay').textContent=score;currentColor=colors[Math.floor(Math.random()*colors.length)];spawnParticles(ball.x,ball.y,'#00ff88',8);}
                if(obstacles[i].isOffScreen())obstacles.splice(i,1);
            }
            for(let i=trailPoints.length-1;i>=0;i--){trailPoints[i].life-=0.05;if(trailPoints[i].life<=0)trailPoints.splice(i,1);}
            for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}
            if(ball.y>canvas.height+50&&gameStarted)gameOver('Ball fell off the world!');
        }
        function draw() {
            const bg=ctx.createLinearGradient(0,0,0,canvas.height);bg.addColorStop(0,'#0a0a2e');bg.addColorStop(1,'#1a0a2e');ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);
            for(let tp of trailPoints){ctx.globalAlpha=tp.life*0.4;ctx.fillStyle=currentColor;ctx.beginPath();ctx.arc(tp.x,tp.y,ball.radius*tp.life,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
            for(let obs of obstacles)obs.draw();
            for(let p of particles)p.draw();
            ctx.shadowColor=currentColor;ctx.shadowBlur=20;
            const bg2=ctx.createRadialGradient(ball.x-4,ball.y-4,2,ball.x,ball.y,ball.radius);bg2.addColorStop(0,'#fff');bg2.addColorStop(0.4,currentColor);bg2.addColorStop(1,'#000');
            ctx.fillStyle=bg2;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
            ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(ball.x-5,ball.y-5,ball.radius*0.35,0,Math.PI*2);ctx.fill();
            if(!gameStarted){ctx.fillStyle='#fff';ctx.font='bold 16px Poppins,Arial';ctx.textAlign='center';ctx.fillText('Click & Drag to Start!',canvas.width/2,ball.y-40);}
            ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px Poppins,Arial';ctx.textAlign='right';ctx.fillText(`Difficulty: ${difficulty}`,canvas.width-15,20);
        }
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
        function getCanvasPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)};}
        canvas.addEventListener('mousedown',(e)=>{mouseDown=true;const p=getCanvasPos(e);mouseX=p.x;mouseY=p.y;});
        canvas.addEventListener('mousemove',(e)=>{if(mouseDown){const p=getCanvasPos(e);mouseX=p.x;mouseY=p.y;}});
        canvas.addEventListener('mouseup',()=>{mouseDown=false;});
        canvas.addEventListener('mouseleave',()=>{mouseDown=false;});
        canvas.addEventListener('touchstart',(e)=>{e.preventDefault();if(!gameRunning){startGame();return;}mouseDown=true;const p=getCanvasPos(e.touches[0]);mouseX=p.x;mouseY=p.y;},{passive:false});
        canvas.addEventListener('touchmove',(e)=>{e.preventDefault();if(mouseDown){const p=getCanvasPos(e.touches[0]);mouseX=p.x;mouseY=p.y;}},{passive:false});
        canvas.addEventListener('touchend',(e)=>{e.preventDefault();mouseDown=false;});
        document.addEventListener('keydown',(e)=>{if(!gameRunning){if(e.key===' ')startGame();return;}const s=5;if(!gameStarted)gameStarted=true;switch(e.key){case'ArrowLeft':case'a':targetX-=s;break;case'ArrowRight':case'd':targetX+=s;break;case'ArrowUp':case'w':targetY-=s;break;case'ArrowDown':case's':targetY+=s;break;}targetX=Math.max(ball.radius,Math.min(canvas.width-ball.radius,targetX));targetY=Math.max(ball.radius,Math.min(canvas.height-ball.radius,targetY));});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)startGame();});
        startGame(); gameLoop();
    </script>
</body>
</html>
