<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Card Match - AlMaGen Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; padding: 10px 20px; margin-bottom: 10px; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .stats { display: flex; gap: 10px; align-items: center; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.55rem; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: bold; }
        canvas { border: 2px solid #ff6b6b; border-radius: 10px; box-shadow: 0 0 30px rgba(255,107,107,0.3); max-width: 95vw; max-height: 60vh; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.5rem; color: #ffd93d; margin-bottom: 10px; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #ff6b6b; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <button class="sound-btn" id="musicToggle" onclick="toggleMusic()" title="Toggle Music">🎵</button>
            <button class="sound-btn" id="restartBtn" onclick="startGame()" title="Restart Game">🔄</button>
            <div class="stat-box"><div class="stat-label">⭐ Score</div><div class="stat-value" id="scoreDisplay" style="color:#ffd93d;">0</div></div>
            <div class="stat-box"><div class="stat-label">🎯 Pairs</div><div class="stat-value" id="pairsDisplay" style="color:#00ff88;">0/8</div></div>
            <div class="stat-box"><div class="stat-label">⏱️ Time</div><div class="stat-value" id="timerDisplay" style="color:#ff6b6b;">0s</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen"><h2>🎉 All Matched!</h2><p id="gameOverMsg"></p><button class="play-again-btn" onclick="startGame()">🔄 Play Again</button></div>
    </div>
    <p class="instructions">🖱️ Click cards to flip | Match pairs of the same suit & color!</p>

    <script src="../js/soundengine.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { const s=Math.min(window.innerWidth-30,window.innerHeight-230,480);canvas.width=s;canvas.height=s; }
        setCanvasSize(); window.addEventListener('resize',setCanvasSize);
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }
        function toggleMusic() { document.getElementById('musicToggle').textContent = sound.toggleMusic() ? '🎵❌' : '🎵'; }

        const suits=['♥','♦','♠','♣'];const suitColors={'♥':'#ff4444','♦':'#ff4444','♠':'#fff','♣':'#fff'};const values=['A','K','Q','J'];
        let cards=[],gridCols=4,gridRows=4,cellSize=0,flippedCards=[],matchedPairs=0,totalPairs=8,score=0,timer=0,timerInterval=null,gameRunning=true,particles=[];

        class Particle{constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*5;this.vy=(Math.random()-0.5)*5-3;this.life=1;this.decay=0.03;this.color=color;this.size=Math.random()*4+2;}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vy+=0.1;}draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
        function spawnParticles(x,y,color,count=8){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}

        function generateCards(){cards=[];const deck=[];for(let suit of suits)for(let val of values){deck.push({suit,value:val,color:suitColors[suit]});deck.push({suit,value:val,color:suitColors[suit]});}for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}for(let r=0;r<gridRows;r++)for(let c=0;c<gridCols;c++){const card=deck[r*gridCols+c];cards.push({x:c*cellSize,y:r*cellSize,width:cellSize,height:cellSize,suit:card.suit,value:card.value,color:card.color,flipped:false,matched:false});}}

        function startGame(){cellSize=canvas.width/gridCols;flippedCards=[];matchedPairs=0;score=0;timer=0;gameRunning=true;particles=[];generateCards();document.getElementById('gameOverScreen').style.display='none';document.getElementById('scoreDisplay').textContent='0';document.getElementById('pairsDisplay').textContent='0/8';document.getElementById('timerDisplay').textContent='0s';clearInterval(timerInterval);timerInterval=setInterval(()=>{if(gameRunning){timer++;document.getElementById('timerDisplay').textContent=timer+'s';}},1000);}

        function flipCard(index){if(!gameRunning||cards[index].flipped||cards[index].matched||flippedCards.length>=2)return;sound.playFlip();cards[index].flipped=true;flippedCards.push(index);if(flippedCards.length===2){const c1=cards[flippedCards[0]],c2=cards[flippedCards[1]];if(c1.suit===c2.suit&&c1.value===c2.value){setTimeout(()=>{sound.playCoin();c1.matched=true;c2.matched=true;matchedPairs++;score+=50;document.getElementById('scoreDisplay').textContent=score;document.getElementById('pairsDisplay').textContent=matchedPairs+'/8';spawnParticles((c1.x+c2.x)/2+cellSize/2,(c1.y+c2.y)/2+cellSize/2,'#ffd93d',12);flippedCards=[];if(matchedPairs===totalPairs){setTimeout(()=>{sound.playWin();gameRunning=false;clearInterval(timerInterval);document.getElementById('gameOverMsg').textContent=`All 8 pairs matched in ${timer}s!`;document.getElementById('gameOverScreen').style.display='flex';spawnParticles(canvas.width/2,canvas.height/2,'#00ff88',30);const pn=localStorage.getItem('almagen_name')||'Player';localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'cardmatch',name:pn,score:score,date:new Date().toISOString()}));if(typeof updateDailyProgress==='function')updateDailyProgress('cardmatch',score);},500);}},400);}else{setTimeout(()=>{c1.flipped=false;c2.flipped=false;flippedCards=[];},800);}}}

        function draw(){ctx.fillStyle='#0a5a1a';ctx.fillRect(0,0,canvas.width,canvas.height);for(let card of cards){const p=6,x=card.x+p,y=card.y+p,w=card.width-p*2,h=card.height-p*2;if(card.matched){ctx.fillStyle='rgba(0,255,136,0.3)';ctx.fillRect(x,y,w,h);ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);ctx.fillStyle='#00ff88';ctx.font='bold 30px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✓',card.x+cellSize/2,card.y+cellSize/2);}else if(card.flipped){ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle=card.color;ctx.font=`bold ${cellSize*0.35}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(card.value,card.x+cellSize/2,card.y+cellSize*0.35);ctx.font=`${cellSize*0.45}px Arial`;ctx.fillText(card.suit,card.x+cellSize/2,card.y+cellSize*0.65);}else{const g=ctx.createLinearGradient(x,y,x+w,y+h);g.addColorStop(0,'#6c5ce7');g.addColorStop(1,'#2d1b4e');ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.strokeStyle='#a29bfe';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font=`${cellSize*0.4}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🃏',card.x+cellSize/2,card.y+cellSize/2);}}for(let p of particles)p.draw();}
        function update(){for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}}
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
        canvas.addEventListener('click',(e)=>{const r=canvas.getBoundingClientRect();const mx=(e.clientX-r.left)*(canvas.width/r.width),my=(e.clientY-r.top)*(canvas.height/r.height);const col=Math.floor(mx/cellSize),row=Math.floor(my/cellSize);const idx=row*gridCols+col;if(idx>=0&&idx<cards.length)flipCard(idx);});
        canvas.addEventListener('touchstart',(e)=>{e.preventDefault();const r=canvas.getBoundingClientRect();const mx=(e.touches[0].clientX-r.left)*(canvas.width/r.width),my=(e.touches[0].clientY-r.top)*(canvas.height/r.height);const col=Math.floor(mx/cellSize),row=Math.floor(my/cellSize);const idx=row*gridCols+col;if(idx>=0&&idx<cards.length)flipCard(idx);});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)startGame();});
        startGame(); gameLoop();
    </script>
</body>
</html>
