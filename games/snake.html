<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Snake - AlMaGen Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; padding: 10px 20px; margin-bottom: 10px; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats { display: flex; gap: 10px; align-items: center; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #00ff88; }
        canvas { border: 2px solid #00ff88; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); max-width: 95vw; max-height: 70vh; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.5rem; color: #ff4444; margin-bottom: 10px; }
        #gameOverScreen p { color: #fff; font-size: 1rem; margin-bottom: 15px; text-align: center; padding: 0 20px; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #00ff88; color: #000; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .play-again-btn:hover { background: #00cc6a; transform: scale(1.05); }
        #mobileControls { display: none; gap: 15px; margin-top: 15px; }
        .ctrl-btn { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #00ff88; background: rgba(0,255,136,0.15); color: #fff; font-size: 1.5rem; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { background: rgba(0,255,136,0.4); transform: scale(0.9); }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
        @media (max-width: 768px) { #mobileControls { display: flex; } .instructions.desktop { display: none; } }
        @media (min-width: 769px) { .instructions.mobile { display: none; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <div class="stat-box"><div class="stat-label">🧠 Math Score</div><div class="stat-value" id="mathScore">0</div></div>
            <div class="stat-box"><div class="stat-label">📏 Length</div><div class="stat-value" id="lengthScore">1</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2>💀 Game Over!</h2>
            <div style="display:flex;gap:20px;margin-bottom:15px;">
                <div style="color:#00ff88;text-align:center;"><div style="font-size:0.7rem;">MATH SCORE</div><div style="font-size:1.8rem;font-weight:bold;" id="finalMath">0</div></div>
                <div style="color:#00ff88;text-align:center;"><div style="font-size:0.7rem;">LENGTH</div><div style="font-size:1.8rem;font-weight:bold;" id="finalLength">1</div></div>
            </div>
            <p id="gameOverMsg"></p>
            <button class="play-again-btn" onclick="startGame()">🔄 Play Again</button>
        </div>
    </div>
    <div id="mobileControls">
        <button class="ctrl-btn" id="btnUp">⬆️</button>
        <button class="ctrl-btn" id="btnLeft">⬅️</button>
        <button class="ctrl-btn" id="btnRight">➡️</button>
        <button class="ctrl-btn" id="btnDown">⬇️</button>
    </div>
    <p class="instructions desktop">⌨️ Arrow Keys to move | Solve math & eat correct answers!</p>
    <p class="instructions mobile">👆 Use buttons or swipe to move</p>

    <script src="../js/soundengine.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function setCanvasSize() {
            const size = Math.min(window.innerWidth - 30, window.innerHeight - 250, 420);
            canvas.width = size; canvas.height = size;
        }
        setCanvasSize();
        window.addEventListener('resize', () => { setCanvasSize(); if (gameRunning) adjustSnakePosition(); });

        function toggleSound() {
            const btn = document.getElementById('soundToggle');
            const enabled = sound.toggle();
            btn.textContent = enabled ? '🔊' : '🔇';
        }

        const gridSize = 20;
        let snake = [], snakeLength = 3;
        let direction = { x: gridSize, y: 0 };
        let nextDirection = { x: gridSize, y: 0 };
        let mathScore = 0, foods = [], gameRunning = true, gameSpeed = 110;
        let gameLoopTimeout, particles = [];

        class MathFood {
            constructor() { this.spawn(); }
            spawn() {
                const cols = Math.floor(canvas.width / gridSize), rows = Math.floor(canvas.height / gridSize);
                this.x = Math.floor(Math.random() * cols) * gridSize;
                this.y = Math.floor(Math.random() * rows) * gridSize;
                const rand = Math.random();
                if (rand < 0.35) {
                    this.num1 = Math.floor(Math.random() * 8) + 2; this.num2 = Math.floor(Math.random() * 8) + 2;
                    this.answer = this.num1 + this.num2; this.display = `${this.num1}+${this.num2}`;
                    this.isCorrect = true; this.value = this.answer;
                } else if (rand < 0.7) {
                    this.num1 = Math.floor(Math.random() * 10) + 5; this.num2 = Math.floor(Math.random() * this.num1);
                    this.answer = this.num1 - this.num2; this.display = `${this.num1}-${this.num2}`;
                    this.isCorrect = true; this.value = this.answer;
                } else {
                    this.num1 = Math.floor(Math.random() * 8) + 2; this.num2 = Math.floor(Math.random() * 8) + 2;
                    this.answer = this.num1 + this.num2;
                    const wrongAnswer = this.answer + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
                    this.display = `${this.num1}+${this.num2}=${wrongAnswer}`;
                    this.isCorrect = false; this.value = 0;
                }
                for (let seg of snake) { if (seg.x === this.x && seg.y === this.y) { this.spawn(); break; } }
            }
            draw() {
                const cx = this.x + gridSize/2, cy = this.y + gridSize/2, radius = gridSize/2 - 2;
                ctx.shadowColor = this.isCorrect ? '#00ff88' : '#ff4444'; ctx.shadowBlur = 10;
                ctx.fillStyle = this.isCorrect ? '#00ff88' : '#ff4444';
                ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
                ctx.fillStyle = '#000'; ctx.font = `bold ${gridSize * 0.45}px Arial`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.display, cx, cy);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4; this.life = 1; this.decay = 0.03;
                this.color = color; this.size = Math.random() * 3 + 1;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
        }

        function spawnParticles(x, y, color, count = 8) { for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color)); }

        function startGame() {
            snake = []; snakeLength = 3; mathScore = 0; gameRunning = true; gameSpeed = 110; particles = [];
            const startX = Math.floor(canvas.width / 2 / gridSize) * gridSize;
            const startY = Math.floor(canvas.height / 2 / gridSize) * gridSize;
            for (let i = 0; i < snakeLength; i++) snake.push({ x: startX - i * gridSize, y: startY });
            direction = { x: gridSize, y: 0 }; nextDirection = { x: gridSize, y: 0 };
            foods = []; for (let i = 0; i < 3; i++) foods.push(new MathFood());
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('mathScore').textContent = '0';
            document.getElementById('lengthScore').textContent = '1';
            clearTimeout(gameLoopTimeout);
            gameLoop();
        }

        function adjustSnakePosition() { for (let seg of snake) { if (seg.x >= canvas.width) seg.x = canvas.width - gridSize; if (seg.y >= canvas.height) seg.y = canvas.height - gridSize; } }

        function gameLoop() {
            if (!gameRunning) return;
            direction = { ...nextDirection };
            const head = { ...snake[0] };
            head.x += direction.x; head.y += direction.y;
            if (head.x >= canvas.width) head.x = 0; if (head.x < 0) head.x = canvas.width - gridSize;
            if (head.y >= canvas.height) head.y = 0; if (head.y < 0) head.y = canvas.height - gridSize;
            snake.unshift(head);
            let ateFood = false;
            for (let i = foods.length - 1; i >= 0; i--) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    if (foods[i].isCorrect) {
                        sound.playCoin();
                        mathScore += foods[i].value; snakeLength++;
                        if (gameSpeed > 50) gameSpeed -= 3;
                        spawnParticles(foods[i].x + gridSize/2, foods[i].y + gridSize/2, '#00ff88', 12);
                    } else {
                        sound.playCrash();
                        spawnParticles(head.x + gridSize/2, head.y + gridSize/2, '#ff4444', 20);
                        gameOver('Wrong answer! ' + foods[i].display); return;
                    }
                    foods.splice(i, 1); foods.push(new MathFood()); ateFood = true; break;
                }
            }
            if (!ateFood && snake.length > snakeLength) snake.pop();
            while (snake.length > snakeLength) snake.pop();
            for (let i = 1; i < snake.length; i++) { if (head.x === snake[i].x && head.y === snake[i].y) { sound.playCrash(); spawnParticles(head.x+gridSize/2, head.y+gridSize/2, '#ff4444', 20); gameOver('You hit yourself!'); return; } }
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].life <= 0) particles.splice(i, 1); }
            draw();
            document.getElementById('mathScore').textContent = mathScore;
            document.getElementById('lengthScore').textContent = snake.length;
            gameLoopTimeout = setTimeout(gameLoop, gameSpeed);
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 0.5;
            for (let x = 0; x < canvas.width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
            for (let food of foods) food.draw();
            for (let p of particles) p.draw();
            for (let i = snake.length - 1; i >= 0; i--) {
                const seg = snake[i]; const progress = i / snake.length;
                const g = Math.floor(255 - progress * 100);
                ctx.fillStyle = i === 0 ? '#00ffff' : `rgb(0,${g},${g})`;
                ctx.beginPath(); ctx.roundRect(seg.x + 1, seg.y + 1, gridSize - 2, gridSize - 2, 4); ctx.fill();
                if (i === 0) {
                    ctx.fillStyle = '#000'; const es = 3;
                    if (direction.x > 0) { ctx.fillRect(seg.x + 12, seg.y + 4, es, es); ctx.fillRect(seg.x + 12, seg.y + 13, es, es); }
                    else if (direction.x < 0) { ctx.fillRect(seg.x + 5, seg.y + 4, es, es); ctx.fillRect(seg.x + 5, seg.y + 13, es, es); }
                    else if (direction.y < 0) { ctx.fillRect(seg.x + 4, seg.y + 5, es, es); ctx.fillRect(seg.x + 13, seg.y + 5, es, es); }
                    else { ctx.fillRect(seg.x + 4, seg.y + 12, es, es); ctx.fillRect(seg.x + 13, seg.y + 12, es, es); }
                }
            }
        }

        function gameOver(message) {
            sound.playLose();
            gameRunning = false; clearTimeout(gameLoopTimeout);
            document.getElementById('finalMath').textContent = mathScore;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('gameOverMsg').textContent = message;
            document.getElementById('gameOverScreen').style.display = 'flex';
            // Save score
            const playerName = localStorage.getItem('almagen_name') || 'Player';
            const key = 'almagen_score_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            localStorage.setItem(key, JSON.stringify({ game: 'snake', name: playerName, score: mathScore, date: new Date().toISOString() }));
            if (typeof updateDailyProgress === 'function') updateDailyProgress('snake', mathScore);
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            switch(e.key) {
                case 'ArrowUp': case 'w': if (direction.y === 0) nextDirection = { x: 0, y: -gridSize }; e.preventDefault(); break;
                case 'ArrowDown': case 's': if (direction.y === 0) nextDirection = { x: 0, y: gridSize }; e.preventDefault(); break;
                case 'ArrowLeft': case 'a': if (direction.x === 0) nextDirection = { x: -gridSize, y: 0 }; e.preventDefault(); break;
                case 'ArrowRight': case 'd': if (direction.x === 0) nextDirection = { x: gridSize, y: 0 }; e.preventDefault(); break;
            }
        });

        document.getElementById('btnUp').addEventListener('pointerdown', (e) => { e.preventDefault(); if (direction.y===0 && gameRunning) nextDirection = { x:0, y:-gridSize }; });
        document.getElementById('btnDown').addEventListener('pointerdown', (e) => { e.preventDefault(); if (direction.y===0 && gameRunning) nextDirection = { x:0, y:gridSize }; });
        document.getElementById('btnLeft').addEventListener('pointerdown', (e) => { e.preventDefault(); if (direction.x===0 && gameRunning) nextDirection = { x:-gridSize, y:0 }; });
        document.getElementById('btnRight').addEventListener('pointerdown', (e) => { e.preventDefault(); if (direction.x===0 && gameRunning) nextDirection = { x:gridSize, y:0 }; });

        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) { startGame(); return; }
            const dx = e.changedTouches[0].clientX - touchStartX, dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) { if (dx > 20 && direction.x===0) nextDirection={x:gridSize,y:0}; else if (dx<-20 && direction.x===0) nextDirection={x:-gridSize,y:0}; }
            else { if (dy > 20 && direction.y===0) nextDirection={x:0,y:gridSize}; else if (dy<-20 && direction.y===0) nextDirection={x:0,y:-gridSize}; }
        });

        document.getElementById('gameOverScreen').addEventListener('click', function(e) { if (e.target === this) startGame(); });
        startGame();
    </script>
</body>
</html>
