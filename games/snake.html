    <script src="../js/soundengine.js"></script>
    <script>
        // ==================== CANVAS SETUP ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gridCols, gridRows;
        const gridSize = 20;

        function setCanvasSize() {
            const size = Math.min(window.innerWidth - 30, window.innerHeight - 300, 420);
            canvas.width = size;
            canvas.height = size;
            gridCols = Math.floor(canvas.width / gridSize);
            gridRows = Math.floor(canvas.height / gridSize);
        }
        setCanvasSize();
        window.addEventListener('resize', () => { setCanvasSize(); });

        // ==================== SOUND ====================
        function toggleSound() {
            const btn = document.getElementById('soundToggle');
            const enabled = sound.toggle();
            btn.textContent = enabled ? '🔊' : '🔇';
        }

        // ==================== GAME STATE ====================
        let snake = [];
        let snakeLength = 3;
        let direction = { x: gridSize, y: 0 };
        let nextDirection = { x: gridSize, y: 0 };
        let mathScore = 0;
        let foods = [];
        let gameRunning = true;
        let isPaused = false;
        let gameSpeed = 120;
        let gameLoopTimeout;
        let particles = [];
        let isWin = false;
        let gameOverMsg = '';
        let lastFrameTime = 0;
        let animationId = null;

        // ==================== GRID UTILITY ====================
        function getRandomGridPos() {
            return {
                x: Math.floor(Math.random() * gridCols) * gridSize,
                y: Math.floor(Math.random() * gridRows) * gridSize
            };
        }

        function isOnSnake(x, y) {
            for (let seg of snake) {
                if (seg.x === x && seg.y === y) return true;
            }
            return false;
        }

        // ==================== FOOD CLASS ====================
        class MathFood {
            constructor() {
                this.spawn();
            }

            spawn() {
                let pos;
                let attempts = 0;
                do {
                    pos = getRandomGridPos();
                    attempts++;
                } while (isOnSnake(pos.x, pos.y) && attempts < 100);

                this.x = pos.x;
                this.y = pos.y;

                const rand = Math.random();
                if (rand < 0.4) {
                    this.num1 = Math.floor(Math.random() * 8) + 2;
                    this.num2 = Math.floor(Math.random() * 8) + 2;
                    this.answer = this.num1 + this.num2;
                    this.display = `${this.num1}+${this.num2}`;
                    this.isCorrect = true;
                    this.value = this.answer;
                } else if (rand < 0.7) {
                    this.num1 = Math.floor(Math.random() * 10) + 5;
                    this.num2 = Math.floor(Math.random() * this.num1);
                    this.answer = this.num1 - this.num2;
                    this.display = `${this.num1}-${this.num2}`;
                    this.isCorrect = true;
                    this.value = this.answer;
                } else {
                    this.num1 = Math.floor(Math.random() * 8) + 2;
                    this.num2 = Math.floor(Math.random() * 8) + 2;
                    this.answer = this.num1 + this.num2;
                    const wrong = this.answer + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
                    this.display = `${this.num1}+${this.num2}=${wrong}`;
                    this.isCorrect = false;
                    this.value = 0;
                }
            }

            draw() {
                const cx = this.x + gridSize / 2;
                const cy = this.y + gridSize / 2;
                const radius = gridSize / 2 - 2;

                ctx.shadowColor = this.isCorrect ? '#00ff88' : '#ff4444';
                ctx.shadowBlur = 15;

                const gradient = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, radius);
                if (this.isCorrect) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc66');
                } else {
                    gradient.addColorStop(0, '#ff4444');
                    gradient.addColorStop(1, '#cc0000');
                }
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#000';
                ctx.font = `bold ${gridSize * 0.4}px Arial, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.display, cx, cy + 1);

                if (this.isCorrect) {
                    ctx.fillStyle = '#fff';
                    ctx.font = `${gridSize * 0.25}px Arial`;
                    ctx.fillText('✓', cx + gridSize * 0.35, cy - gridSize * 0.35);
                }
            }

            // Collision detection with snake head
            collidesWith(head) {
                return head.x === this.x && head.y === this.y;
            }
        }

        // ==================== PARTICLE SYSTEM ====================
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5 - 1;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        function spawnParticles(x, y, color, count = 12) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // ==================== GAME LOGIC ====================
        function startGame() {
            // Cancel any existing animation
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (gameLoopTimeout) {
                clearTimeout(gameLoopTimeout);
                gameLoopTimeout = null;
            }

            snake = [];
            snakeLength = 3;
            mathScore = 0;
            gameRunning = true;
            isPaused = false;
            gameSpeed = 120;
            particles = [];
            isWin = false;
            gameOverMsg = '';

            const startX = Math.floor(gridCols / 2) * gridSize;
            const startY = Math.floor(gridRows / 2) * gridSize;
            for (let i = 0; i < snakeLength; i++) {
                snake.push({ x: startX - i * gridSize, y: startY });
            }

            direction = { x: gridSize, y: 0 };
            nextDirection = { x: gridSize, y: 0 };

            foods = [];
            for (let i = 0; i < 3; i++) {
                foods.push(new MathFood());
            }

            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('pauseOverlay').style.display = 'none';
            document.getElementById('gameOverTitle').textContent = '💀 Game Over!';
            document.getElementById('gameOverTitle').style.color = '#ff4444';
            document.getElementById('gameOverMsg').textContent = '';
            document.getElementById('mathScore').textContent = '0';
            document.getElementById('lengthScore').textContent = '1';
            document.getElementById('pauseBtn').textContent = '⏸️';

            // Start game loop with requestAnimationFrame for smooth updates
            lastFrameTime = performance.now();
            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) {
                draw();
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            if (isPaused) {
                draw();
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            // Update game at fixed speed
            const now = performance.now();
            const delta = now - lastFrameTime;

            if (delta >= gameSpeed) {
                updateGame();
                lastFrameTime = now;
            }

            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function updateGame() {
            // Update direction
            if (!isOppositeDirection(direction, nextDirection)) {
                direction = { ...nextDirection };
            }

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Wall collision
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                gameOver('You hit the wall!');
                return;
            }

            // Self collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver('You hit yourself!');
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            let ateFood = false;
            for (let i = foods.length - 1; i >= 0; i--) {
                if (foods[i].collidesWith(head)) {
                    if (foods[i].isCorrect) {
                        mathScore += foods[i].value;
                        snakeLength++;
                        spawnParticles(foods[i].x + gridSize / 2, foods[i].y + gridSize / 2, '#00ff88', 15);
                        sound.playCoin();

                        if (gameSpeed > 50) {
                            gameSpeed = Math.max(50, gameSpeed - 2);
                        }
                    } else {
                        spawnParticles(foods[i].x + gridSize / 2, foods[i].y + gridSize / 2, '#ff4444', 20);
                        sound.playCrash();
                        gameOver('Wrong answer! ' + foods[i].display);
                        return;
                    }

                    foods.splice(i, 1);
                    foods.push(new MathFood());
                    ateFood = true;
                    break;
                }
            }

            if (!ateFood && snake.length > snakeLength) {
                snake.pop();
            }

            while (snake.length > snakeLength) {
                snake.pop();
            }

            // WIN CONDITION
            if (snake.length >= gridCols * gridRows) {
                isWin = true;
                spawnParticles(canvas.width / 2, canvas.height / 2, '#ffd93d', 40);
                spawnParticles(canvas.width / 2, canvas.height / 2, '#00ff88', 40);
                sound.playWin();
                gameOver('🎉 You filled the entire grid! You WIN!');
                return;
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Update UI
            document.getElementById('mathScore').textContent = mathScore;
            document.getElementById('lengthScore').textContent = snake.length;

            const totalCells = gridCols * gridRows;
            const filled = snake.length;
            const progress = Math.min(100, (filled / totalCells) * 100);
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function isOppositeDirection(dir1, dir2) {
            return (dir1.x === -dir2.x && dir1.y === -dir2.y);
        }

        // ==================== PAUSE / RESUME ====================
        function togglePause() {
            if (!gameRunning || isWin) return;
            isPaused = !isPaused;
            document.getElementById('pauseOverlay').style.display = isPaused ? 'flex' : 'none';
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️' : '⏸️';
            if (isPaused) {
                sound.playClick();
            } else {
                lastFrameTime = performance.now();
            }
        }

        function resumeGame() {
            if (isPaused) {
                togglePause();
            }
        }

        // ==================== GAME OVER ====================
        function gameOver(message) {
            gameRunning = false;
            gameOverMsg = message;
            sound.playLose();

            if (isWin) {
                document.getElementById('gameOverTitle').textContent = '🎉 You Win!';
                document.getElementById('gameOverTitle').style.color = '#00ff88';
                sound.playWin();
            } else {
                document.getElementById('gameOverTitle').textContent = '💀 Game Over!';
                document.getElementById('gameOverTitle').style.color = '#ff4444';
            }

            const totalCells = gridCols * gridRows;
            const filled = snake.length;
            const progress = Math.min(100, (filled / totalCells) * 100);

            document.getElementById('finalMath').textContent = mathScore;
            document.getElementById('finalLength').textContent = snake.length;
            document.getElementById('finalGrid').textContent = Math.round(progress) + '%';
            document.getElementById('gameOverMsg').textContent = message;
            document.getElementById('gameOverScreen').style.display = 'flex';

            // Save score
            try {
                const playerName = localStorage.getItem('almagen_name') || 'Player';
                const key = 'almagen_score_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                localStorage.setItem(key, JSON.stringify({
                    game: 'snake',
                    name: playerName,
                    score: mathScore,
                    length: snake.length,
                    date: new Date().toISOString()
                }));
                if (typeof updateDailyProgress === 'function') {
                    updateDailyProgress('snake', mathScore);
                }
            } catch (e) { /* ignore */ }
        }

        // ==================== DRAW FUNCTION ====================
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw foods
            for (let food of foods) {
                food.draw();
            }

            // Draw particles
            for (let p of particles) {
                p.draw();
            }

            // Draw snake
            for (let i = snake.length - 1; i >= 0; i--) {
                const seg = snake[i];
                const progress = i / snake.length;

                if (i === 0) {
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 15;
                }

                const g = Math.floor(255 - progress * 120);
                const r = Math.floor(0 + progress * 80);
                const b = Math.floor(255 - progress * 80);

                ctx.fillStyle = i === 0 ? '#00ff88' : `rgb(${r}, ${g}, ${b})`;
                ctx.beginPath();
                ctx.roundRect(seg.x + 1.5, seg.y + 1.5, gridSize - 3, gridSize - 3, 4);
                ctx.fill();

                ctx.shadowBlur = 0;

                // Eyes on head
                if (i === 0) {
                    ctx.fillStyle = '#000';
                    const es = 3;
                    const offset = 6;
                    if (direction.x > 0) {
                        ctx.fillRect(seg.x + gridSize - offset, seg.y + 4, es, es);
                        ctx.fillRect(seg.x + gridSize - offset, seg.y + gridSize - 4 - es, es, es);
                    } else if (direction.x < 0) {
                        ctx.fillRect(seg.x + offset - es, seg.y + 4, es, es);
                        ctx.fillRect(seg.x + offset - es, seg.y + gridSize - 4 - es, es, es);
                    } else if (direction.y < 0) {
                        ctx.fillRect(seg.x + 4, seg.y + offset - es, es, es);
                        ctx.fillRect(seg.x + gridSize - 4 - es, seg.y + offset - es, es, es);
                    } else {
                        ctx.fillRect(seg.x + 4, seg.y + gridSize - offset, es, es);
                        ctx.fillRect(seg.x + gridSize - 4 - es, seg.y + gridSize - offset, es, es);
                    }
                }
            }
        }

        // ==================== KEYBOARD CONTROLS ====================
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) {
                if (e.key === 'Enter' || e.key === ' ') {
                    startGame();
                    e.preventDefault();
                }
                return;
            }

            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                togglePause();
                e.preventDefault();
                return;
            }

            if (isPaused) {
                e.preventDefault();
                return;
            }

            const key = e.key;
            e.preventDefault();

            switch (key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -gridSize };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: gridSize };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -gridSize, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: gridSize, y: 0 };
                    break;
                case 'r':
                case 'R':
                    startGame();
                    break;
            }
        });

        // ==================== TOUCH CONTROLS ====================
        document.getElementById('btnUp').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (gameRunning && !isPaused && direction.y === 0) nextDirection = { x: 0, y: -gridSize };
        });
        document.getElementById('btnDown').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (gameRunning && !isPaused && direction.y === 0) nextDirection = { x: 0, y: gridSize };
        });
        document.getElementById('btnLeft').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (gameRunning && !isPaused && direction.x === 0) nextDirection = { x: -gridSize, y: 0 };
        });
        document.getElementById('btnRight').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (gameRunning && !isPaused && direction.x === 0) nextDirection = { x: gridSize, y: 0 };
        });

        // Swipe on canvas
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) {
                startGame();
                return;
            }
            if (isPaused) return;

            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 20 && direction.x === 0) nextDirection = { x: gridSize, y: 0 };
                else if (dx < -20 && direction.x === 0) nextDirection = { x: -gridSize, y: 0 };
            } else {
                if (dy > 20 && direction.y === 0) nextDirection = { x: 0, y: gridSize };
                else if (dy < -20 && direction.y === 0) nextDirection = { x: 0, y: -gridSize };
            }
        }, { passive: true });

        // Click on game over to restart
        document.getElementById('gameOverScreen').addEventListener('click', function(e) {
            if (e.target === this) startGame();
        });

        // Click on pause overlay to resume
        document.getElementById('pauseOverlay').addEventListener('click', function(e) {
            if (e.target === this) resumeGame();
        });

        // ==================== ROUND RECT POLYFILL ====================
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // ==================== START GAME ====================
        startGame();
    </script>
</body>
</html>
