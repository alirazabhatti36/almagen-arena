    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 550px; padding: 10px 20px; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; }
        canvas { border: 2px solid #a8e6cf; border-radius: 10px; box-shadow: 0 0 30px rgba(168, 230, 207, 0.3); max-width: 95vw; max-height: 65vh; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.2rem; margin-bottom: 10px; }
        .win-title { color: #00ff88; } .lose-title { color: #ff6b6b; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #a8e6cf; color: #000; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .play-again-btn:hover { background: #8fd4b8; transform: scale(1.05); }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <button class="sound-btn" id="restartBtn" onclick="startGame()" title="Restart Game">🔄</button>
            <div class="stat-box"><div class="stat-label">🎯 Level</div><div class="stat-value" id="levelDisplay" style="color:#a8e6cf;">1</div></div>
            <div class="stat-box"><div class="stat-label">👆 Moves</div><div class="stat-value" id="movesDisplay" style="color:#ffd93d;">0</div></div>
            <div class="stat-box"><div class="stat-label">⏱️ Time</div><div class="stat-value" id="timerDisplay" style="color:#ff6b6b;">0s</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2 id="gameOverTitle">🎉 Level Complete!</h2><p id="gameOverMsg"></p>
            <div style="display:flex;gap:20px;margin-bottom:15px;">
                <div style="color:#ffd93d;text-align:center;"><div style="font-size:0.7rem;">MOVES</div><div style="font-size:1.5rem;font-weight:bold;" id="finalMoves">0</div></div>
                <div style="color:#ff6b6b;text-align:center;"><div style="font-size:0.7rem;">TIME</div><div style="font-size:1.5rem;font-weight:bold;" id="finalTime">0s</div></div>
            </div>
            <button class="play-again-btn" id="nextBtn" onclick="nextLevel()">▶ Next Level</button>
        </div>
    </div>
    <p class="instructions">🖱️ Click cells to toggle | 👆 Tap cells | Mirror the LEFT pattern on the RIGHT!</p>

    <script src="../js/soundengine.js?v=20260722-1"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { const s = Math.min(window.innerWidth-30, window.innerHeight-240, 480); canvas.width = s; canvas.height = s; }
        setCanvasSize(); window.addEventListener('resize', () => { setCanvasSize(); if(gameRunning) setupGrid(); });
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }

        let gridSize = 4, cellSize = 0, leftGrid = [], rightGrid = [], targetPattern = [];
        let gameRunning = true, level = 1, moves = 0, timer = 0, timerInterval = null, particles = [];

        class Particle {
            constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*4;this.vy=(Math.random()-0.5)*4;this.life=1;this.decay=0.03;this.color=color;this.size=Math.random()*3+2;}
            update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;}
            draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
        }
        function spawnParticles(x,y,color,count=10){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}

        function generatePattern() {
            leftGrid=[];targetPattern=[];rightGrid=[];
            const fillChance=Math.min(0.3+level*0.05,0.6), cols=gridSize;
            for(let r=0;r<gridSize;r++){leftGrid[r]=[];targetPattern[r]=[];rightGrid[r]=[];for(let c=0;c<cols;c++){const f=Math.random()<fillChance;leftGrid[r][c]=f;targetPattern[r][cols-1-c]=f;rightGrid[r][c]=false;}}
        }
        function setupGrid(){cellSize=Math.floor(canvas.width/(gridSize*2+1));generatePattern();}
        function startGame(){
            level=1;moves=0;timer=0;gameRunning=true;particles=[];setupGrid();
            document.getElementById('gameOverScreen').style.display='none';document.getElementById('levelDisplay').textContent='1';
            document.getElementById('movesDisplay').textContent='0';document.getElementById('timerDisplay').textContent='0s';
            clearInterval(timerInterval);timerInterval=setInterval(()=>{if(gameRunning){timer++;document.getElementById('timerDisplay').textContent=timer+'s';}},1000);
        }
        function nextLevel(){level++;gridSize=Math.min(4+Math.floor((level-1)/3),7);moves=0;timer=0;gameRunning=true;particles=[];setupGrid();document.getElementById('gameOverScreen').style.display='none';document.getElementById('levelDisplay').textContent=level;document.getElementById('movesDisplay').textContent='0';document.getElementById('timerDisplay').textContent='0s';clearInterval(timerInterval);timerInterval=setInterval(()=>{if(gameRunning){timer++;document.getElementById('timerDisplay').textContent=timer+'s';}},1000);}
        function checkWin(){for(let r=0;r<gridSize;r++)for(let c=0;c<gridSize;c++)if(rightGrid[r][c]!==targetPattern[r][c])return false;return true;}
        function winLevel(){
            sound.playWin();gameRunning=false;clearInterval(timerInterval);
            document.getElementById('gameOverTitle').textContent='🎉 Level Complete!';document.getElementById('gameOverTitle').className='win-title';
            document.getElementById('gameOverMsg').textContent=`Perfect mirror! Matched in ${moves} moves!`;
            document.getElementById('finalMoves').textContent=moves;document.getElementById('finalTime').textContent=timer+'s';
            document.getElementById('nextBtn').style.display='inline-block';document.getElementById('gameOverScreen').style.display='flex';
            const pn=localStorage.getItem('almagen_name')||'Player';
            localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'puzzle',name:pn,score:level*100-moves,date:new Date().toISOString()}));
            if(typeof updateDailyProgress==='function')updateDailyProgress('puzzle',level);
        }
        function handleCellClick(gc,gr){
            if(!gameRunning||gc<=gridSize||gc>gridSize*2)return;
            const rc=gc-gridSize-1;if(rc<0||rc>=gridSize)return;
            sound.playClick();rightGrid[gr][rc]=!rightGrid[gr][rc];moves++;document.getElementById('movesDisplay').textContent=moves;
            const cx=gc*cellSize+cellSize/2,cy=gr*cellSize+cellSize/2;spawnParticles(cx,cy,rightGrid[gr][rc]?'#a8e6cf':'#ff6b6b',6);
            if(checkWin())setTimeout(winLevel,300);
        }
        function draw(){
            ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
            const ox=(canvas.width-(gridSize*2+1)*cellSize)/2,oy=(canvas.height-gridSize*cellSize)/2;
            for(let r=0;r<gridSize;r++){for(let c=0;c<gridSize*2+1;c++){const x=ox+c*cellSize,y=oy+r*cellSize;if(c===gridSize){ctx.fillStyle='rgba(168,230,207,0.15)';ctx.fillRect(x,y,cellSize,cellSize);ctx.strokeStyle='rgba(168,230,207,0.5)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.strokeRect(x+2,y+2,cellSize-4,cellSize-4);ctx.setLineDash([]);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font=`${cellSize*0.5}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🪞',x+cellSize/2,y+cellSize/2);continue;}let f=false,t=false,ls=c<gridSize,rc=c-gridSize-1;if(ls)f=leftGrid[r][c];else if(rc>=0&&rc<gridSize){f=rightGrid[r][rc];t=targetPattern[r][rc];}if(ls)ctx.fillStyle=f?'rgba(168,230,207,0.3)':'rgba(255,255,255,0.03)';else ctx.fillStyle=f?(t?'rgba(0,255,136,0.4)':'rgba(255,107,107,0.4)'):'rgba(255,255,255,0.05)';ctx.fillRect(x+3,y+3,cellSize-6,cellSize-6);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.strokeRect(x+3,y+3,cellSize-6,cellSize-6);if(f&&!ls){ctx.fillStyle=t?'#00ff88':'#ff6b6b';ctx.beginPath();ctx.arc(x+cellSize/2,y+cellSize/2,cellSize*0.2,0,Math.PI*2);ctx.fill();}else if(f&&ls){ctx.fillStyle='#a8e6cf';ctx.beginPath();ctx.arc(x+cellSize/2,y+cellSize/2,cellSize*0.2,0,Math.PI*2);ctx.fill();}if(!f&&t&&!ls){ctx.strokeStyle='rgba(0,255,136,0.3)';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.beginPath();ctx.arc(x+cellSize/2,y+cellSize/2,cellSize*0.2,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}}}
            for(let p of particles)p.draw();
        }
        function update(){for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}}
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
        function getGridPos(e){const r=canvas.getBoundingClientRect();const mx=(e.clientX-r.left)*(canvas.width/r.width),my=(e.clientY-r.top)*(canvas.height/r.height);const ox=(canvas.width-(gridSize*2+1)*cellSize)/2,oy=(canvas.height-gridSize*cellSize)/2;const col=Math.floor((mx-ox)/cellSize),row=Math.floor((my-oy)/cellSize);if(col>=0&&col<gridSize*2+1&&row>=0&&row<gridSize)return{col,row};return null;}
        canvas.addEventListener('click',(e)=>{if(!gameRunning)return;const p=getGridPos(e);if(p)handleCellClick(p.col,p.row);});
        canvas.addEventListener('touchstart',(e)=>{e.preventDefault();if(!gameRunning)return;const p=getGridPos(e.touches[0]);if(p)handleCellClick(p.col,p.row);},{passive:false});
        document.addEventListener('keydown',(e)=>{if(!gameRunning)return;if(e.key==='r'||e.key==='R'){level=1;startGame();}});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)nextLevel();});
        startGame(); gameLoop();
    </script>
</body>
