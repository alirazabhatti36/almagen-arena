<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Breaker - AlMaGen Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; padding: 10px 20px; margin-bottom: 10px; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats { display: flex; gap: 10px; align-items: center; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; }
        canvas { border: 2px solid #ffd93d; border-radius: 10px; box-shadow: 0 0 30px rgba(255,217,61,0.3); max-width: 95vw; max-height: 65vh; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.5rem; margin-bottom: 10px; }
        .win-title { color: #00ff88; } .lose-title { color: #ff6b6b; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #ffd93d; color: #000; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .play-again-btn:hover { background: #ffc800; transform: scale(1.05); }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <button class="sound-btn" id="musicToggle" onclick="toggleMusic()" title="Toggle Music">🎵</button>
            <button class="sound-btn" id="restartBtn" onclick="startGame()" title="Restart Game">🔄</button>
            <div class="stat-box"><div class="stat-label">⭐ Score</div><div class="stat-value" id="scoreDisplay" style="color:#ffd93d;">0</div></div>
            <div class="stat-box"><div class="stat-label">❤️ Lives</div><div class="stat-value" id="livesDisplay" style="color:#ff6b6b;">3</div></div>
            <div class="stat-box"><div class="stat-label">🎯 Level</div><div class="stat-value" id="levelDisplay" style="color:#00ff88;">1</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2 id="gameOverTitle">💥 Game Over!</h2><p id="gameOverMsg"></p>
            <div style="color:#ffd93d;font-size:1.5rem;margin-bottom:15px;">Final Score: <span id="finalScore" style="font-weight:bold;">0</span></div>
            <button class="play-again-btn" onclick="startGame()">🔄 Play Again</button>
        </div>
    </div>
    <p class="instructions">🖱️ Move Mouse / 👆 Touch Drag / ⌨️ Arrow Keys | Break all blocks!</p>

    <script src="../js/soundengine.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { canvas.width = Math.min(window.innerWidth-30, 600); canvas.height = Math.min(window.innerHeight-240, 500); }
        setCanvasSize(); window.addEventListener('resize',()=>{setCanvasSize();if(gameRunning)resetBall();});
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }
        function toggleMusic() { document.getElementById('musicToggle').textContent = sound.toggleMusic() ? '🎵❌' : '🎵'; }

        let paddle = { x:0, y:0, width:100, height:15, speed:8 };
        let ball = { x:0, y:0, radius:10, vx:0, vy:0, speed:6 };
        let blocks=[], particles=[], powerups=[], score=0, lives=3, level=1, gameRunning=true, ballLaunched=false, comboCount=0, comboTimer=0;
        const colors=['#ff4444','#ff6b6b','#ffd93d','#00ff88','#00d4ff','#6c5ce7','#a29bfe','#ff8800'];

        class Block {
            constructor(x,y,w,h,hits){this.x=x;this.y=y;this.width=w;this.height=h;this.hits=hits;this.maxHits=hits;this.color=colors[Math.min(hits-1,colors.length-1)];this.alive=true;this.shakeTimer=0;}
            draw(){if(!this.alive)return;const s=this.shakeTimer>0?(Math.random()-0.5)*3:0;ctx.fillStyle=this.color;ctx.fillRect(this.x+s,this.y,this.width-2,this.height-2);ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(this.x+s,this.y,this.width-2,this.height/3);if(this.hits>1){ctx.fillStyle='#fff';ctx.font='bold 16px Poppins,Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.hits,this.x+this.width/2,this.y+this.height/2);}}
            hit(){this.hits--;this.shakeTimer=8;if(this.hits<=0){this.alive=false;return true;}this.color=colors[Math.min(this.hits-1,colors.length-1)];return false;}
        }
        class PowerUp {
            constructor(x,y,type){this.x=x;this.y=y;this.width=25;this.height=25;this.vy=2;this.type=type;this.emoji={widen:'↔️',slow:'🐌',multiball:'✨',extralife:'❤️'}[type];}
            update(){this.y+=this.vy;}
            draw(){ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(this.x,this.y,this.width,this.height);ctx.strokeStyle='#fff';ctx.strokeRect(this.x,this.y,this.width,this.height);ctx.font='16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.emoji,this.x+this.width/2,this.y+this.height/2);}
        }
        class Particle {
            constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*6;this.vy=(Math.random()-0.5)*6-2;this.life=1;this.decay=0.025;this.color=color;this.size=Math.random()*4+2;}
            update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vy+=0.08;}
            draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
        }
        function spawnParticles(x,y,color,count=10){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}

        function generateLevel(){blocks=[];const cols=8,rows=4+Math.floor(level/2),bw=canvas.width/cols,bh=35,sy=50;for(let r=0;r<Math.min(rows,8);r++)for(let c=0;c<cols;c++){const h=Math.min(1+Math.floor(Math.random()*level),5);blocks.push(new Block(c*bw+1,sy+r*bh,bw,bh,h));}}
        function startGame(){paddle.x=canvas.width/2-50;paddle.y=canvas.height-40;paddle.width=100;ball.x=paddle.x+50;ball.y=paddle.y-10;ball.vx=0;ball.vy=0;ball.speed=6;ballLaunched=false;blocks=[];particles=[];powerups=[];score=0;lives=3;level=1;gameRunning=true;comboCount=0;comboTimer=0;generateLevel();document.getElementById('gameOverScreen').style.display='none';document.getElementById('scoreDisplay').textContent='0';document.getElementById('livesDisplay').textContent='3';document.getElementById('levelDisplay').textContent='1';}
        function resetBall(){ball.x=paddle.x+paddle.width/2;ball.y=paddle.y-ball.radius;ball.vx=0;ball.vy=0;ballLaunched=false;paddle.width=100;}
        function launchBall(){if(ballLaunched)return;ballLaunched=true;const a=(Math.random()-0.5)*0.8-0.5;ball.vx=Math.sin(a)*ball.speed;ball.vy=Math.cos(a)*ball.speed;sound.playClick();}
        function loseLife(){sound.playCrash();lives--;document.getElementById('livesDisplay').textContent=lives;spawnParticles(ball.x,ball.y,'#ff4444',20);comboCount=0;if(lives<=0){sound.playLose();gameRunning=false;document.getElementById('gameOverTitle').textContent='💥 Game Over!';document.getElementById('gameOverTitle').className='lose-title';document.getElementById('gameOverMsg').textContent=`Cleared ${level-1} levels!`;document.getElementById('finalScore').textContent=score;document.getElementById('gameOverScreen').style.display='flex';const pn=localStorage.getItem('almagen_name')||'Player';localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'blockbreaker',name:pn,score:score,date:new Date().toISOString()}));if(typeof updateDailyProgress==='function')updateDailyProgress('blockbreaker',score);}else resetBall();}
        function checkLevelComplete(){if(blocks.every(b=>!b.alive)){sound.playWin();level++;document.getElementById('levelDisplay').textContent=level;ball.speed+=0.5;spawnParticles(canvas.width/2,canvas.height/2,'#00ff88',30);generateLevel();resetBall();score+=50*level;document.getElementById('scoreDisplay').textContent=score;}}

        function update(){
            if(!gameRunning)return;
            if(ballLaunched){ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x-ball.radius<0){ball.x=ball.radius;ball.vx*=-1;}if(ball.x+ball.radius>canvas.width){ball.x=canvas.width-ball.radius;ball.vx*=-1;}if(ball.y-ball.radius<0){ball.y=ball.radius;ball.vy*=-1;}if(ball.y>canvas.height+30)loseLife();
                if(ball.vy>0&&ball.y+ball.radius>paddle.y&&ball.y-ball.radius<paddle.y+paddle.height&&ball.x>paddle.x&&ball.x<paddle.x+paddle.width){sound.playClick();ball.y=paddle.y-ball.radius;const hp=(ball.x-paddle.x)/paddle.width;ball.vx=Math.sin((hp-0.5)*Math.PI*0.7)*ball.speed;ball.vy=-Math.cos((hp-0.5)*Math.PI*0.7)*ball.speed;spawnParticles(ball.x,ball.y,'#fff',5);}
                for(let block of blocks){if(!block.alive)continue;if(ball.x+ball.radius>block.x&&ball.x-ball.radius<block.x+block.width&&ball.y+ball.radius>block.y&&ball.y-ball.radius<block.y+block.height){const d=block.hit();if(d){sound.playCoin();score+=block.maxHits*10;document.getElementById('scoreDisplay').textContent=score;comboCount++;comboTimer=60;spawnParticles(block.x+block.width/2,block.y+block.height/2,block.color,12);if(Math.random()<0.2){const t=['widen','slow','multiball','extralife'];powerups.push(new PowerUp(block.x+block.width/2,block.y+block.height/2,t[Math.floor(Math.random()*t.length)]));}}else sound.playScore();const ol=(ball.x+ball.radius)-block.x,or=(block.x+block.width)-(ball.x-ball.radius),ot=(ball.y+ball.radius)-block.y,ob=(block.y+block.height)-(ball.y-ball.radius);if(Math.min(ol,or)<Math.min(ot,ob))ball.vx*=-1;else ball.vy*=-1;break;}}
                for(let i=powerups.length-1;i>=0;i--){powerups[i].update();if(powerups[i].y+powerups[i].height>paddle.y&&powerups[i].x>paddle.x&&powerups[i].x<paddle.x+paddle.width){sound.playPowerUp();const pu=powerups[i];switch(pu.type){case'widen':paddle.width=Math.min(200,paddle.width+30);break;case'slow':ball.speed=Math.max(3,ball.speed-1);break;case'extralife':lives=Math.min(5,lives+1);document.getElementById('livesDisplay').textContent=lives;break;case'multiball':score+=30;document.getElementById('scoreDisplay').textContent=score;break;}powerups.splice(i,1);spawnParticles(pu.x,pu.y,'#ffd93d',8);}else if(powerups[i].y>canvas.height)powerups.splice(i,1);}
                if(comboTimer>0){comboTimer--;if(comboTimer===0)comboCount=0;}checkLevelComplete();}else ball.x=paddle.x+paddle.width/2;
            for(let block of blocks)if(block.shakeTimer>0)block.shakeTimer--;
            for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}
        }
        function draw(){
            ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
            for(let block of blocks)block.draw();
            for(let pu of powerups)pu.draw();
            for(let p of particles)p.draw();
            const bg=ctx.createRadialGradient(ball.x-2,ball.y-2,2,ball.x,ball.y,ball.radius);bg.addColorStop(0,'#fff');bg.addColorStop(0.5,'#ffd93d');bg.addColorStop(1,'#ff8800');
            ctx.fillStyle=bg;ctx.shadowColor='#ffd93d';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
            const pg=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.height);pg.addColorStop(0,'#6c5ce7');pg.addColorStop(1,'#2d1b4e');ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.width,paddle.height,8);ctx.fill();ctx.strokeStyle='#a29bfe';ctx.lineWidth=2;ctx.stroke();
            if(!ballLaunched){ctx.fillStyle='#fff';ctx.font='bold 16px Poppins,Arial';ctx.textAlign='center';ctx.fillText('Click or Space to Launch!',canvas.width/2,paddle.y-25);}
            if(comboCount>2&&comboTimer>0){ctx.fillStyle='#ffd93d';ctx.font='bold 20px Poppins,Arial';ctx.textAlign='center';ctx.fillText(`COMBO x${comboCount}!`,canvas.width/2,canvas.height/2);}
        }
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
        canvas.addEventListener('mousemove',(e)=>{const r=canvas.getBoundingClientRect();paddle.x=(e.clientX-r.left)*(canvas.width/r.width)-paddle.width/2;paddle.x=Math.max(0,Math.min(canvas.width-paddle.width,paddle.x));});
        canvas.addEventListener('click',()=>{if(gameRunning&&!ballLaunched)launchBall();if(!gameRunning)startGame();});
        canvas.addEventListener('touchmove',(e)=>{e.preventDefault();const r=canvas.getBoundingClientRect();paddle.x=(e.touches[0].clientX-r.left)*(canvas.width/r.width)-paddle.width/2;paddle.x=Math.max(0,Math.min(canvas.width-paddle.width,paddle.x));},{passive:false});
        canvas.addEventListener('touchstart',(e)=>{e.preventDefault();if(gameRunning&&!ballLaunched)launchBall();if(!gameRunning)startGame();});
        document.addEventListener('keydown',(e)=>{switch(e.key){case'ArrowLeft':case'a':paddle.x-=paddle.speed;break;case'ArrowRight':case'd':paddle.x+=paddle.speed;break;case' ':if(gameRunning&&!ballLaunched)launchBall();if(!gameRunning)startGame();e.preventDefault();break;}paddle.x=Math.max(0,Math.min(canvas.width-paddle.width,paddle.x));});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)startGame();});
        startGame(); gameLoop();
    </script>
</body>
</html>
