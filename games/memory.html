    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; padding: 10px 20px; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; }

        #gameOverScreen h2 { font-size: 2.5rem; margin-bottom: 10px; }
        .win-title { color: #00ff88; } .lose-title { color: #ff6b6b; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #a29bfe; color: #000; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
        @media (max-width: 768px) {
            .top-bar { max-width: 100%; padding: 8px 10px; flex-direction: column; align-items: stretch; }
            .top-bar .back-btn { width: fit-content; }
            .stats { width: 100%; justify-content: flex-start; gap: 8px; }

<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <button class="sound-btn" id="restartBtn" onclick="startGame()" title="Restart Game">🔄</button>
            <div class="stat-box"><div class="stat-label">🎯 Level</div><div class="stat-value" id="levelDisplay" style="color:#a29bfe;">1</div></div>
            <div class="stat-box"><div class="stat-label">👆 Moves</div><div class="stat-value" id="movesDisplay" style="color:#ffd93d;">0</div></div>
            <div class="stat-box"><div class="stat-label">⏱️ Time</div><div class="stat-value" id="timerDisplay" style="color:#ff6b6b;">0s</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2 id="gameOverTitle">🎉 Level Complete!</h2><p id="gameOverMsg"></p>
            <div style="display:flex;gap:20px;margin-bottom:15px;">
                <div style="color:#ffd93d;text-align:center;"><div style="font-size:0.7rem;">MOVES</div><div style="font-size:1.5rem;font-weight:bold;" id="finalMoves">0</div></div>
                <div style="color:#ff6b6b;text-align:center;"><div style="font-size:0.7rem;">TIME</div><div style="font-size:1.5rem;font-weight:bold;" id="finalTime">0s</div></div>
            </div>
            <button class="play-again-btn" id="nextBtn" onclick="nextLevel()">▶ Next Level</button>
        </div>
    </div>
    <p class="instructions">🖱️ Click cards to flip | Match all pairs to win!</p>

    <script src="../js/soundengine.js?v=20260722-1"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { const s = Math.min(window.innerWidth-30, window.innerHeight-250, 480); canvas.width=s; canvas.height=s; }
        setCanvasSize(); window.addEventListener('resize',()=>{setCanvasSize();if(gameRunning)createGrid();});
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }

        const emojis = ['🎮','🎯','🌟','🔥','💎','🎪','🎨','🎵','🚀','🌈','🦊','🐼','🦄','🍕','⚽','🎸'];
        let cards=[], gridSize=4, flippedCards=[], matchedPairs=0, totalPairs=0, moves=0, timer=0, timerInterval=null, gameRunning=true, level=1, particles=[];

        class Particle {
            constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*4;this.vy=(Math.random()-0.5)*4;this.life=1;this.decay=0.03;this.color=color;this.size=Math.random()*3+2;}
            update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;}
            draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
        }
        function spawnParticles(x,y,color,count=8){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}

        function createGrid() {
            cards=[];flippedCards=[];matchedPairs=0;gridSize=Math.min(4+Math.floor((level-1)/2),8);if(gridSize%2!==0)gridSize++;
            totalPairs=(gridSize*gridSize)/2;const se=emojis.slice(0,totalPairs);const ce=[...se,...se];
            for(let i=ce.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ce[i],ce[j]]=[ce[j],ce[i]];}
            const cs=canvas.width/gridSize;
            for(let r=0;r<gridSize;r++)for(let c=0;c<gridSize;c++)cards.push({x:c*cs,y:r*cs,width:cs,height:cs,emoji:ce[r*gridSize+c],flipped:false,matched:false});
        }
        function startGame() {
            level=1;moves=0;timer=0;gameRunning=true;particles=[];createGrid();
            document.getElementById('gameOverScreen').style.display='none';document.getElementById('levelDisplay').textContent='1';
            document.getElementById('movesDisplay').textContent='0';document.getElementById('timerDisplay').textContent='0s';
            clearInterval(timerInterval);timerInterval=setInterval(()=>{if(gameRunning){timer++;document.getElementById('timerDisplay').textContent=timer+'s';}},1000);
        }
        function nextLevel() {
            level++;moves=0;timer=0;gameRunning=true;particles=[];createGrid();
            document.getElementById('gameOverScreen').style.display='none';document.getElementById('levelDisplay').textContent=level;
            document.getElementById('movesDisplay').textContent='0';document.getElementById('timerDisplay').textContent='0s';
            clearInterval(timerInterval);timerInterval=setInterval(()=>{if(gameRunning){timer++;document.getElementById('timerDisplay').textContent=timer+'s';}},1000);
        }
        function flipCard(index) {
            if(!gameRunning||cards[index].flipped||cards[index].matched||flippedCards.length>=2)return;
            sound.playFlip();cards[index].flipped=true;flippedCards.push(index);
            if(flippedCards.length===2){moves++;document.getElementById('movesDisplay').textContent=moves;
                const c1=cards[flippedCards[0]],c2=cards[flippedCards[1]];
                if(c1.emoji===c2.emoji){setTimeout(()=>{sound.playCoin();c1.matched=true;c2.matched=true;matchedPairs++;flippedCards=[];spawnParticles((c1.x+c2.x)/2+c1.width/2,(c1.y+c2.y)/2+c1.height/2,'#00ff88',12);if(matchedPairs===totalPairs)setTimeout(winLevel,400);},300);}
                else{setTimeout(()=>{c1.flipped=false;c2.flipped=false;flippedCards=[];},700);}
            }
        }
        function winLevel() {
            sound.playWin();gameRunning=false;clearInterval(timerInterval);
            document.getElementById('gameOverTitle').textContent='🎉 Level Complete!';document.getElementById('gameOverTitle').className='win-title';
            document.getElementById('gameOverMsg').textContent=`All pairs matched in ${moves} moves!`;
            document.getElementById('finalMoves').textContent=moves;document.getElementById('finalTime').textContent=timer+'s';
            document.getElementById('nextBtn').style.display='inline-block';document.getElementById('gameOverScreen').style.display='flex';
            const pn=localStorage.getItem('almagen_name')||'Player';
            localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'memory',name:pn,score:level*100-moves,date:new Date().toISOString()}));
            if(typeof updateDailyProgress==='function')updateDailyProgress('memory',level);
        }
        function draw() {
            ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
            const cs=canvas.width/gridSize;
            for(let card of cards){const p=4,x=card.x+p,y=card.y+p,w=card.width-p*2,h=card.height-p*2;
                if(card.matched){ctx.fillStyle='rgba(0,255,136,0.15)';ctx.fillRect(x,y,w,h);ctx.strokeStyle='rgba(0,255,136,0.4)';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);ctx.font=`${w*0.5}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(card.emoji,card.x+card.width/2,card.y+card.height/2);}
                else if(card.flipped){ctx.fillStyle='rgba(162,155,254,0.2)';ctx.fillRect(x,y,w,h);ctx.strokeStyle='rgba(162,155,254,0.5)';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);ctx.font=`${w*0.5}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(card.emoji,card.x+card.width/2,card.y+card.height/2);}
                else{const g=ctx.createLinearGradient(x,y,x+w,y+h);g.addColorStop(0,'#6c5ce7');g.addColorStop(1,'#a29bfe');ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font=`bold ${w*0.4}px Poppins,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',card.x+card.width/2,card.y+card.height/2);}
            }
            for(let p of particles)p.draw();
        }
        function update(){for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}}
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
        canvas.addEventListener('click',(e)=>{const r=canvas.getBoundingClientRect();const mx=(e.clientX-r.left)*(canvas.width/r.width),my=(e.clientY-r.top)*(canvas.height/r.height);const cs=canvas.width/gridSize;const col=Math.floor(mx/cs),row=Math.floor(my/cs);const idx=row*gridSize+col;if(idx>=0&&idx<cards.length)flipCard(idx);});
        canvas.addEventListener('touchstart',(e)=>{e.preventDefault();const r=canvas.getBoundingClientRect();const mx=(e.touches[0].clientX-r.left)*(canvas.width/r.width),my=(e.touches[0].clientY-r.top)*(canvas.height/r.height);const cs=canvas.width/gridSize;const col=Math.floor(mx/cs),row=Math.floor(my/cs);const idx=row*gridSize+col;if(idx>=0&&idx<cards.length)flipCard(idx);});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)nextLevel();});
        startGame(); gameLoop();
    </script>
</body>
</html>
