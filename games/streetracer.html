    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; padding: 10px 20px; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; }
        canvas { border: 2px solid #ff6b6b; border-radius: 10px; box-shadow: 0 0 30px rgba(255,107,107,0.3); max-width: 95vw; max-height: 70vh; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 10px; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #ff6b6b; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #mobileControls { display: none; gap: 15px; margin-top: 12px; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff6b6b; background: rgba(255,107,107,0.15); color: #fff; font-size: 1.5rem; cursor: pointer; touch-action: manipulation; }
        .ctrl-btn:active { background: rgba(255,107,107,0.4); transform: scale(0.9); }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
        .guide-pill { display: inline-block; margin-top: 6px; padding: 6px 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; font-size: 0.68rem; color: rgba(255,255,255,0.8); }
        @media (max-width: 768px) { #mobileControls { display: flex; } .instructions.desktop { display: none; } }
        @media (min-width: 769px) { .instructions.mobile { display: none; } }

</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <div class="stat-box"><div class="stat-label">⭐ Score</div><div class="stat-value" id="scoreDisplay" style="color:#ffd93d;">0</div></div>
            <div class="stat-box"><div class="stat-label">🚗 Speed</div><div class="stat-value" id="speedDisplay" style="color:#00ff88;">0</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2>💥 Crashed!</h2><p id="gameOverMsg"></p>
            <div style="color:#ffd93d;font-size:1.5rem;margin-bottom:15px;">Score: <span id="finalScore" style="font-weight:bold;">0</span></div>
            <button class="play-again-btn" onclick="startGame()">🔄 Play Again</button>
        </div>
    </div>
    <div id="mobileControls">
        <button class="ctrl-btn" id="btnLeft">⬅️</button>
        <button class="ctrl-btn" id="btnRight">➡️</button>
    </div>
    <p class="instructions desktop">Desktop: use the Left/Right Arrow keys or A/D. Mobile/Tablet/iPhone: tap the buttons or drag left/right on the screen to steer.</p>
    <p class="instructions mobile">👆 Tap buttons to steer, or drag left/right on the screen.</p>
    <div class="guide-pill">Avoid traffic and stay on the road.</div>

    <script src="../js/soundengine.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { canvas.width = Math.min(window.innerWidth-30, 450); canvas.height = Math.min(window.innerHeight-260, 650); }
        setCanvasSize(); window.addEventListener('resize', setCanvasSize);
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }
        function toggleMusic() { document.getElementById('musicToggle').textContent = sound.toggleMusic() ? '🎵❌' : '🎵'; }
        function moveCarBy(delta) {
            if (!gameRunning) return;
            car.x = Math.max(22, Math.min(canvas.width - car.width - 22, car.x + delta));
        }

        let car = { x:0, y:0, width:45, height:80 };
        let obstacles=[], particles=[], score=0, gameSpeed=4, gameRunning=true, frameCount=0, spawnTimer=0, roadLines=[];

        for(let i=0;i<15;i++) roadLines.push({y:i*50});

        class Obstacle {
            constructor(){this.width=40+Math.random()*20;this.height=70+Math.random()*20;this.x=Math.random()*(canvas.width-this.width-60)+30;this.y=-this.height;this.speed=gameSpeed+Math.random()*2;this.color=`hsl(${Math.random()*360},70%,55%)`;this.passed=false;}
            update(){this.y+=this.speed;}
            draw(){ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=8;ctx.fillRect(this.x+3,this.y+5,this.width-6,this.height-10);ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(this.x+8,this.y+10,this.width-16,this.height-35);ctx.fillStyle='rgba(0,212,255,0.5)';ctx.fillRect(this.x+5,this.y+10,this.width-10,this.height-40);ctx.fillStyle='#111';ctx.fillRect(this.x+2,this.y+8,8,14);ctx.fillRect(this.x+this.width-10,this.y+8,8,14);ctx.fillRect(this.x+2,this.y+this.height-22,8,14);ctx.fillRect(this.x+this.width-10,this.y+this.height-22,8,14);ctx.fillStyle='#ffd93d';ctx.fillRect(this.x+6,this.y+this.height-10,6,6);ctx.fillRect(this.x+this.width-12,this.y+this.height-10,6,6);ctx.shadowBlur=0;}
            isOffScreen(){return this.y>canvas.height+80;}
        }

        class Particle {
            constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*4;this.vy=(Math.random()-0.5)*4-2;this.life=1;this.decay=0.03;this.color=color;this.size=Math.random()*3+2;}
            update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vy+=0.1;}
            draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
        }
        function spawnParticles(x,y,color,count=12){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}

        function startGame(){car.x=canvas.width/2-22;car.y=canvas.height-120;obstacles=[];particles=[];score=0;gameSpeed=4;gameRunning=true;frameCount=0;spawnTimer=0;document.getElementById('gameOverScreen').style.display='none';document.getElementById('scoreDisplay').textContent='0';document.getElementById('speedDisplay').textContent='0 km/h';}
        function gameOver(msg){sound.playLose();gameRunning=false;spawnParticles(car.x+car.width/2,car.y+car.height/2,'#ff4444',25);document.getElementById('finalScore').textContent=score;document.getElementById('gameOverMsg').textContent=msg;document.getElementById('gameOverScreen').style.display='flex';const pn=localStorage.getItem('almagen_name')||'Player';localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'streetracer',name:pn,score:score,date:new Date().toISOString()}));if(typeof updateDailyProgress==='function')updateDailyProgress('streetracer',score);}

        function update(){
            if(!gameRunning)return;frameCount++;gameSpeed=4+Math.floor(frameCount/300)*0.5;if(gameSpeed>14)gameSpeed=14;
            document.getElementById('speedDisplay').textContent=Math.floor(gameSpeed*15)+' km/h';
            spawnTimer++;const rate=Math.max(25,60-gameSpeed*2);if(spawnTimer>=rate){spawnTimer=0;obstacles.push(new Obstacle());}
            for(let i=obstacles.length-1;i>=0;i--){obstacles[i].update();obstacles[i].speed=gameSpeed+Math.random()*1.5;
                if(car.x<obstacles[i].x+obstacles[i].width&&car.x+car.width>obstacles[i].x&&car.y<obstacles[i].y+obstacles[i].height&&car.y+car.height>obstacles[i].y){gameOver('You crashed! Score: '+score);return;}
                if(!obstacles[i].passed&&obstacles[i].y>car.y+car.height){sound.playScore();obstacles[i].passed=true;score+=10;document.getElementById('scoreDisplay').textContent=score;}
                if(obstacles[i].isOffScreen())obstacles.splice(i,1);}
            for(let line of roadLines){line.y+=gameSpeed;if(line.y>canvas.height+20)line.y=-30;}
            for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}
        }
        function draw(){
            const rg=ctx.createLinearGradient(0,0,canvas.width,0);rg.addColorStop(0,'#1a1a1a');rg.addColorStop(0.5,'#333');rg.addColorStop(1,'#1a1a1a');ctx.fillStyle=rg;ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle='#333';ctx.fillRect(0,0,15,canvas.height);ctx.fillRect(canvas.width-15,0,15,canvas.height);
            ctx.strokeStyle='#ffd93d';ctx.lineWidth=3;ctx.setLineDash([30,20]);for(let line of roadLines){ctx.beginPath();ctx.moveTo(canvas.width/2,line.y);ctx.lineTo(canvas.width/2,line.y+30);ctx.stroke();}ctx.setLineDash([]);
            for(let obs of obstacles)obs.draw();
            for(let p of particles)p.draw();
            const cx=car.x+car.width/2,cy=car.y+car.height/2;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(car.x-3,car.y+5,car.width+6,car.height);
            const cg=ctx.createLinearGradient(car.x,car.y,car.x,car.y+car.height);cg.addColorStop(0,'#ff4444');cg.addColorStop(0.5,'#cc0000');cg.addColorStop(1,'#990000');ctx.fillStyle=cg;ctx.beginPath();ctx.roundRect(car.x,car.y,car.width,car.height,8);ctx.fill();
            ctx.fillStyle='rgba(0,212,255,0.6)';ctx.fillRect(car.x+8,car.y+10,car.width-16,20);
            ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(car.x+6,car.y+12,car.width-12,car.height-45);
            ctx.fillStyle='#111';ctx.fillRect(car.x-4,car.y+8,8,16);ctx.fillRect(car.x+car.width-4,car.y+8,8,16);ctx.fillRect(car.x-4,car.y+car.height-24,8,16);ctx.fillRect(car.x+car.width-4,car.y+car.height-24,8,16);
            ctx.fillStyle='#ffd93d';ctx.fillRect(car.x+4,car.y+car.height-4,8,6);ctx.fillRect(car.x+car.width-12,car.y+car.height-4,8,6);
            ctx.fillStyle='#fff';ctx.fillRect(cx-4,car.y,8,car.height);
        }
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
        const keys={};document.addEventListener('keydown',(e)=>{keys[e.key]=true;if(e.key===' '&&!gameRunning)startGame();});document.addEventListener('keyup',(e)=>{keys[e.key]=false;});
        function handleMovement(){if(!gameRunning)return;const ms=6;if(keys['ArrowLeft']||keys['a'])car.x-=ms;if(keys['ArrowRight']||keys['d'])car.x+=ms;car.x=Math.max(22,Math.min(canvas.width-car.width-22,car.x));requestAnimationFrame(handleMovement);}handleMovement();
        document.getElementById('btnLeft').addEventListener('pointerdown',(e)=>{e.preventDefault();keys['ArrowLeft']=true;});document.getElementById('btnLeft').addEventListener('pointerup',()=>{keys['ArrowLeft']=false;});
        document.getElementById('btnRight').addEventListener('pointerdown',(e)=>{e.preventDefault();keys['ArrowRight']=true;});document.getElementById('btnRight').addEventListener('pointerup',()=>{keys['ArrowRight']=false;});
        let touchStartX = 0;
        canvas.addEventListener('touchstart',(e)=>{touchStartX=e.touches[0].clientX;},{passive:true});
        canvas.addEventListener('touchmove',(e)=>{e.preventDefault();if(!gameRunning)return;const r=canvas.getBoundingClientRect();const touchX=e.touches[0].clientX;const delta=(touchX-touchStartX)/2;moveCarBy(delta);touchStartX=touchX;},{passive:false});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)startGame();});
        startGame(); gameLoop();
    </script>
</body>
</html>
