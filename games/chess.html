<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Chess - AlMaGen Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 480px; padding: 10px 20px; margin-bottom: 10px; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .stats { display: flex; gap: 10px; align-items: center; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.55rem; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: bold; }
        canvas { border: 2px solid #a29bfe; border-radius: 10px; box-shadow: 0 0 30px rgba(162,155,254,0.3); max-width: 95vw; max-height: 65vh; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.5rem; margin-bottom: 10px; }
        .win-title { color: #00ff88; } .lose-title { color: #ff6b6b; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #a29bfe; color: #000; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <div class="stat-box"><div class="stat-label">⚪ You</div><div class="stat-value" id="playerPieces" style="color:#fff;">6</div></div>
            <div class="stat-box"><div class="stat-label">⚫ AI</div><div class="stat-value" id="aiPieces" style="color:#888;">6</div></div>
            <div class="stat-box"><div class="stat-label">⭐ Score</div><div class="stat-value" id="scoreDisplay" style="color:#ffd93d;">0</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen"><h2 id="gameOverTitle">🎉 You Win!</h2><p id="gameOverMsg"></p><button class="play-again-btn" onclick="startGame()">🔄 Play Again</button></div>
    </div>
    <p class="instructions">🖱️ Click your piece (white) then click destination | Capture all black pieces!</p>

    <script src="../js/soundengine.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { const s=Math.min(window.innerWidth-30,window.innerHeight-230,460);canvas.width=s;canvas.height=s; }
        setCanvasSize(); window.addEventListener('resize',setCanvasSize);
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }

        const BS=6;let board=[],cellSize=0,selectedPiece=null,gameRunning=true,score=0,particles=[],playerTurn=true;

        function initBoard(){board=[];for(let r=0;r<BS;r++){board[r]=[];for(let c=0;c<BS;c++){if(r<2)board[r][c]={type:'pawn',color:'black'};else if(r>=BS-2)board[r][c]={type:'pawn',color:'white'};else board[r][c]=null;}}}
        class Particle{constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*5;this.vy=(Math.random()-0.5)*5-3;this.life=1;this.decay=0.03;this.color=color;this.size=Math.random()*4+2;}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vy+=0.1;}draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
        function spawnParticles(x,y,color,count=10){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}

        function startGame(){initBoard();selectedPiece=null;gameRunning=true;score=0;particles=[];playerTurn=true;document.getElementById('gameOverScreen').style.display='none';document.getElementById('playerPieces').textContent=countPieces('white');document.getElementById('aiPieces').textContent=countPieces('black');document.getElementById('scoreDisplay').textContent='0';}
        function countPieces(color){let c=0;for(let r=0;r<BS;r++)for(let cc=0;cc<BS;cc++)if(board[r][cc]&&board[r][cc].color===color)c++;return c;}

        function isValidMove(fr,fc,tr,tc,piece){if(tr<0||tr>=BS||tc<0||tc>=BS)return false;const target=board[tr][tc];if(target&&target.color===piece.color)return false;const dr=tr-fr,dc=Math.abs(tc-fc);if(piece.color==='white'){if(dr!==-1)return false;if(dc===1&&target&&target.color==='black')return true;if(dc===0&&!target)return true;return false;}else{if(dr!==1)return false;if(dc===1&&target&&target.color==='white')return true;if(dc===0&&!target)return true;return false;}}
        function getValidMoves(r,c,piece){const m=[];const d=piece.color==='white'?-1:1;if(isValidMove(r,c,r+d,c,piece))m.push({r:r+d,c});if(isValidMove(r,c,r+d,c-1,piece))m.push({r:r+d,c:c-1});if(isValidMove(r,c,r+d,c+1,piece))m.push({r:r+d,c:c+1});return m;}

        function aiMove(){if(!gameRunning||playerTurn)return;const am=[];for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)if(board[r][c]&&board[r][c].color==='black'){const m=getValidMoves(r,c,board[r][c]);m.forEach(mm=>am.push({fr:r,fc:c,tr:mm.r,tc:mm.c}));}if(am.length===0){endGame(true);return;}const mv=am[Math.floor(Math.random()*am.length)];const cap=board[mv.tr][mv.tc];board[mv.tr][mv.tc]=board[mv.fr][mv.fc];board[mv.fr][mv.fc]=null;if(cap){score-=10;document.getElementById('scoreDisplay').textContent=score;spawnParticles((mv.tc+0.5)*cellSize,(mv.tr+0.5)*cellSize,'#ff4444',8);}updateUI();playerTurn=true;if(countPieces('white')===0)endGame(false);}
        function updateUI(){document.getElementById('playerPieces').textContent=countPieces('white');document.getElementById('aiPieces').textContent=countPieces('black');}
        function endGame(pw){gameRunning=false;const t=document.getElementById('gameOverTitle');if(pw){sound.playWin();t.textContent='🎉 You Win!';t.className='win-title';document.getElementById('gameOverMsg').textContent='All black pieces captured!';spawnParticles(canvas.width/2,canvas.height/2,'#00ff88',25);}else{sound.playLose();t.textContent='😢 You Lose!';t.className='lose-title';document.getElementById('gameOverMsg').textContent='All your pieces captured!';spawnParticles(canvas.width/2,canvas.height/2,'#ff4444',25);}document.getElementById('gameOverScreen').style.display='flex';const pn=localStorage.getItem('almagen_name')||'Player';localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'chess',name:pn,score:score,date:new Date().toISOString()}));if(typeof updateDailyProgress==='function')updateDailyProgress('chess',score);}

        function draw(){cellSize=canvas.width/BS;
            for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){ctx.fillStyle=(r+c)%2===0?'#f0d9b5':'#b58863';ctx.fillRect(c*cellSize,r*cellSize,cellSize,cellSize);}
            if(selectedPiece){ctx.fillStyle='rgba(255,217,61,0.5)';ctx.fillRect(selectedPiece.c*cellSize,selectedPiece.r*cellSize,cellSize,cellSize);const m=getValidMoves(selectedPiece.r,selectedPiece.c,board[selectedPiece.r][selectedPiece.c]);for(let mm of m){ctx.fillStyle='rgba(0,255,136,0.3)';ctx.fillRect(mm.c*cellSize+8,mm.r*cellSize+8,cellSize-16,cellSize-16);}}
            for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)if(board[r][c]){const cx=c*cellSize+cellSize/2,cy=r*cellSize+cellSize/2,rad=cellSize*0.35;ctx.fillStyle=board[r][c].color==='white'?'#fff':'#333';ctx.strokeStyle=board[r][c].color==='white'?'#ccc':'#000';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=board[r][c].color==='white'?'#333':'#fff';ctx.font=`${rad}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('♟',cx,cy);}
            for(let p of particles)p.draw();
            ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,canvas.height-22,canvas.width,22);ctx.fillStyle='#fff';ctx.font='12px Poppins,Arial';ctx.textAlign='center';ctx.fillText(playerTurn?'🔴 YOUR TURN':'⏳ AI Thinking...',canvas.width/2,canvas.height-7);
        }
        function update(){for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}}
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}

        canvas.addEventListener('click',(e)=>{if(!gameRunning||!playerTurn)return;const r=canvas.getBoundingClientRect();const mx=(e.clientX-r.left)*(canvas.width/r.width),my=(e.clientY-r.top)*(canvas.height/r.height);const col=Math.floor(mx/cellSize),row=Math.floor(my/cellSize);if(selectedPiece){const piece=board[selectedPiece.r][selectedPiece.c];if(piece&&isValidMove(selectedPiece.r,selectedPiece.c,row,col,piece)){const cap=board[row][col];board[row][col]=piece;board[selectedPiece.r][selectedPiece.c]=null;sound.playClick();if(cap){sound.playCoin();score+=10;document.getElementById('scoreDisplay').textContent=score;spawnParticles((col+0.5)*cellSize,(row+0.5)*cellSize,'#ffd93d',10);}selectedPiece=null;updateUI();playerTurn=false;if(countPieces('black')===0)endGame(true);else setTimeout(aiMove,600);}else selectedPiece=null;}else if(row<BS&&col<BS&&board[row][col]&&board[row][col].color==='white')selectedPiece={r:row,c:col};});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)startGame();});
        startGame(); gameLoop();
    </script>
</body>
</html>
