    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; padding: 10px 20px; margin-bottom: 10px; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .stats { display: flex; gap: 10px; align-items: center; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }

        .ctrl-btn:active { background: rgba(255,217,61,0.4); transform: scale(0.9); }

        @media (max-width: 768px) { #mobileControls { display: flex; } .instructions.desktop { display: none; } }
        @media (min-width: 769px) { .instructions.mobile { display: none; } }

<body>

            <div style="display:flex;gap:20px;margin-bottom:15px;"><div style="color:#ffd93d;text-align:center;"><div style="font-size:0.7rem;">SCORE</div><div style="font-size:1.5rem;font-weight:bold;" id="finalScore">0</div></div><div style="color:#00ff88;text-align:center;"><div style="font-size:0.7rem;">COINS</div><div style="font-size:1.5rem;font-weight:bold;" id="finalCoins">0</div></div></div>
            <button class="play-again-btn" onclick="startGame()">🔄 Play Again</button>

    <p class="instructions mobile">👆 Tap buttons to move | Collect coins, avoid obstacles!</p>

    <script src="../js/soundengine.js?v=20260722-1"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { canvas.width = Math.min(window.innerWidth-30, 600); canvas.height = Math.min(window.innerHeight-260, 420); }
        setCanvasSize(); window.addEventListener('resize', setCanvasSize);
        function toggleSound() { document.getElementById('soundToggle').textContent = sound.toggle() ? '🔊' : '🔇'; }

        let bike = { x:80, y:0, lane:1, targetY:0, width:55, height:35 };
        let obstacles=[], coins=[], particles=[], score=0, coinCount=0, gameRunning=true, frameCount=0, spawnTimer=0, gameSpeed=3;
        const lanes=[0,1,2];const laneHeight=()=>canvas.height/3;const laneY=(l)=>l*laneHeight()+laneHeight()/2;

        class Obstacle{constructor(lane){this.lane=lane;this.width=30;this.height=30;this.x=canvas.width+40;this.y=laneY(lane);this.speed=gameSpeed+Math.random()*2;this.type=Math.random()<0.5?'rock':'barrier';}update(){this.x-=this.speed;}draw(){ctx.fillStyle=this.type==='rock'?'#888':'#ff4444';ctx.shadowColor=this.type==='rock'?'#888':'#ff4444';ctx.shadowBlur=6;if(this.type==='rock'){ctx.beginPath();ctx.arc(this.x,this.y,15,0,Math.PI*2);ctx.fill();}else ctx.fillRect(this.x-12,this.y-15,24,30);ctx.shadowBlur=0;}isOffScreen(){return this.x<-60;}collides(bx,by,bw,bh){const dx=Math.abs(this.x-bx),dy=Math.abs(this.y-by);return dx<bw/2+15&&dy<bh/2+15;}}
        class Coin{constructor(lane){this.lane=lane;this.x=canvas.width+40;this.y=laneY(lane);this.radius=12;this.speed=gameSpeed+0.5;this.angle=0;}update(){this.x-=this.speed;this.angle+=0.05;}draw(){ctx.fillStyle='#ffd93d';ctx.shadowColor='#ffd93d';ctx.shadowBlur=10;const sx=Math.abs(Math.cos(this.angle));ctx.save();ctx.translate(this.x,this.y);ctx.scale(sx||0.1,1);ctx.beginPath();ctx.arc(0,0,this.radius,0,Math.PI*2);ctx.fill();ctx.restore();ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',this.x,this.y);ctx.shadowBlur=0;}isOffScreen(){return this.x<-50;}collides(bx,by,bw,bh){const dx=Math.abs(this.x-bx),dy=Math.abs(this.y-by);return Math.sqrt(dx*dx+dy*dy)<this.radius+20;}}
        class Particle{constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*5;this.vy=(Math.random()-0.5)*5-3;this.life=1;this.decay=0.03;this.color=color;this.size=Math.random()*4+2;}update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;this.vy+=0.1;}draw(){ctx.globalAlpha=this.life;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
        function spawnParticles(x,y,color,count=10){for(let i=0;i<count;i++)particles.push(new Particle(x,y,color));}

        function startGame(){bike.lane=1;bike.y=laneY(1);bike.targetY=bike.y;obstacles=[];coins=[];particles=[];score=0;coinCount=0;gameRunning=true;frameCount=0;spawnTimer=0;gameSpeed=3;document.getElementById('gameOverScreen').style.display='none';document.getElementById('scoreDisplay').textContent='0';document.getElementById('coinDisplay').textContent='0';}
        function gameOver(msg){sound.playLose();gameRunning=false;spawnParticles(bike.x,bike.y,'#ff4444',20);document.getElementById('finalScore').textContent=score;document.getElementById('finalCoins').textContent=coinCount;document.getElementById('gameOverMsg').textContent=msg;document.getElementById('gameOverScreen').style.display='flex';const pn=localStorage.getItem('almagen_name')||'Player';localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),JSON.stringify({game:'motostunt',name:pn,score:score,date:new Date().toISOString()}));if(typeof updateDailyProgress==='function')updateDailyProgress('motostunt',score);}

        function update(){
            if(!gameRunning)return;frameCount++;gameSpeed=3+Math.floor(frameCount/400)*0.4;if(gameSpeed>10)gameSpeed=10;
            bike.targetY=laneY(bike.lane);bike.y+=(bike.targetY-bike.y)*0.1;
            spawnTimer++;const rate=Math.max(30,65-gameSpeed*3);if(spawnTimer>=rate){spawnTimer=0;const lane=Math.floor(Math.random()*3);if(Math.random()<0.5)obstacles.push(new Obstacle(lane));else coins.push(new Coin(lane));}
            for(let i=obstacles.length-1;i>=0;i--){obstacles[i].update();obstacles[i].speed=gameSpeed+Math.random()*1.5;if(obstacles[i].collides(bike.x+20,bike.y,bike.width,bike.height)){gameOver('You crashed!');return;}if(obstacles[i].isOffScreen()){obstacles.splice(i,1);sound.playScore();score+=5;document.getElementById('scoreDisplay').textContent=score;}}
            for(let i=coins.length-1;i>=0;i--){coins[i].update();coins[i].speed=gameSpeed+0.5;if(coins[i].collides(bike.x+20,bike.y,bike.width,bike.height)){sound.playCoin();coinCount++;document.getElementById('coinDisplay').textContent=coinCount;score+=15;document.getElementById('scoreDisplay').textContent=score;spawnParticles(coins[i].x,coins[i].y,'#ffd93d',8);coins.splice(i,1);}else if(coins[i].isOffScreen())coins.splice(i,1);}
            for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].life<=0)particles.splice(i,1);}
        }
        function draw(){
            const sg=ctx.createLinearGradient(0,0,0,canvas.height);sg.addColorStop(0,'#1a1a3e');sg.addColorStop(1,'#2d1b4e');ctx.fillStyle=sg;ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.moveTo(0,canvas.height);for(let x=0;x<=canvas.width;x+=50)ctx.lineTo(x,canvas.height*0.6+Math.sin(x*0.01)*50);ctx.lineTo(canvas.width,canvas.height);ctx.fill();
            const gg=ctx.createLinearGradient(0,0,0,canvas.height);gg.addColorStop(0,'#2d5016');gg.addColorStop(1,'#1a3009');ctx.fillStyle=gg;ctx.fillRect(0,canvas.height*0.7,canvas.width,canvas.height*0.3);
            ctx.fillStyle='#333';ctx.fillRect(0,canvas.height*0.15,canvas.width,canvas.height*0.7);
            ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.setLineDash([20,15]);ctx.lineWidth=2;for(let i=1;i<3;i++){const ly=canvas.height*0.15+(canvas.height*0.7/3)*i;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(canvas.width,ly);ctx.stroke();}ctx.setLineDash([]);
            for(let coin of coins)coin.draw();for(let obs of obstacles)obs.draw();for(let p of particles)p.draw();
            const bx=bike.x,by=bike.y;ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(bx+25,by+20,30,5,0,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#111';ctx.strokeStyle='#333';ctx.lineWidth=3;ctx.beginPath();ctx.arc(bx+10,by+10,12,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(bx+40,by+10,12,0,Math.PI*2);ctx.fill();ctx.stroke();
            ctx.strokeStyle='#ff6b6b';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(bx+10,by+10);ctx.lineTo(bx+25,by-8);ctx.lineTo(bx+40,by+10);ctx.stroke();
            ctx.fillStyle='#cc0000';ctx.beginPath();ctx.roundRect(bx+18,by-3,14,8,3);ctx.fill();
            ctx.strokeStyle='#aaa';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(bx+40,by+10);ctx.lineTo(bx+50,by-5);ctx.stroke();
            ctx.beginPath();ctx.moveTo(bx+46,by-5);ctx.lineTo(bx+55,by-8);ctx.stroke();
            ctx.fillStyle='#ffd93d';ctx.beginPath();ctx.arc(bx+52,by-6,4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#6c5ce7';ctx.beginPath();ctx.arc(bx+28,by-16,9,0,Math.PI*2);ctx.fill();
            ctx.strokeStyle='#6c5ce7';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(bx+28,by-8);ctx.lineTo(bx+25,by-2);ctx.stroke();
        }
        function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
        document.addEventListener('keydown',(e)=>{if(!gameRunning){if(e.key===' ')startGame();return;}if((e.key==='ArrowUp'||e.key==='w')&&bike.lane>0)bike.lane--;if((e.key==='ArrowDown'||e.key==='s')&&bike.lane<2)bike.lane++;});
        document.getElementById('btnUp').addEventListener('pointerdown',(e)=>{e.preventDefault();if(gameRunning&&bike.lane>0)bike.lane--;});document.getElementById('btnDown').addEventListener('pointerdown',(e)=>{e.preventDefault();if(gameRunning&&bike.lane<2)bike.lane++;});
        let touchStartY=0;canvas.addEventListener('touchstart',(e)=>{touchStartY=e.touches[0].clientY;});canvas.addEventListener('touchmove',(e)=>e.preventDefault(),{passive:false});canvas.addEventListener('touchend',(e)=>{if(!gameRunning){startGame();return;}const dy=e.changedTouches[0].clientY-touchStartY;if(dy<-25&&bike.lane>0)bike.lane--;if(dy>25&&bike.lane<2)bike.lane++;});
        document.getElementById('gameOverScreen').addEventListener('click',function(e){if(e.target===this)startGame();});
        startGame(); gameLoop();
    </script>

    <script src="../js/global-layout.js" defer></script>
