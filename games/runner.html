<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Life Runner - AlMaGen Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; overflow: hidden; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 650px; padding: 10px 20px; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
        .back-btn { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .sound-btn { background: rgba(255,255,255,0.1); border: none; font-size: 1rem; cursor: pointer; padding: 8px 12px; border-radius: 10px; color: #fff; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #ffd93d; }
        canvas { border: 2px solid #ff6b6b; border-radius: 10px; box-shadow: 0 0 30px rgba(255, 107, 107, 0.3); max-width: 95vw; max-height: 70vh; }
        #gameContainer { position: relative; }
        #gameOverScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); border-radius: 10px; justify-content: center; align-items: center; flex-direction: column; z-index: 10; }
        #gameOverScreen h2 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 10px; }
        #gameOverScreen p { color: #fff; font-size: 1rem; margin-bottom: 15px; text-align: center; padding: 0 20px; }
        .play-again-btn { padding: 12px 35px; font-size: 1.1rem; background: #ff6b6b; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .play-again-btn:hover { background: #e55a5a; transform: scale(1.05); }
        #mobileControls { display: none; gap: 20px; margin-top: 15px; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ff6b6b; background: rgba(255,107,107,0.15); color: #fff; font-size: 1.8rem; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { background: rgba(255,107,107,0.4); transform: scale(0.9); }
        .instructions { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-top: 6px; text-align: center; }
        @media (max-width: 768px) { #mobileControls { display: flex; } .instructions.desktop { display: none; } }
        @media (min-width: 769px) { .instructions.mobile { display: none; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← Back</a>
        <div class="stats">
            <button class="sound-btn" id="soundToggle" onclick="toggleSound()" title="Toggle Sound">🔊</button>
            <div class="stat-box"><div class="stat-label">🌟 Good Deeds</div><div class="stat-value" id="scoreDisplay">0</div></div>
        </div>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2>💔 Game Over!</h2>
            <p id="gameOverMsg"></p>
            <div style="color:#ffd93d;font-size:1.5rem;margin-bottom:15px;">Good Deeds: <span id="finalScore" style="font-weight:bold;">0</span></div>
            <button class="play-again-btn" onclick="startGame()">🔄 Play Again</button>
        </div>
    </div>
    <div id="mobileControls">
        <button class="ctrl-btn" id="btnUp">⬆️</button>
        <button class="ctrl-btn" id="btnDown">⬇️</button>
    </div>
    <p class="instructions desktop">⌨️ UP/DOWN Arrow Keys | Collect ✅ Good, Avoid ❌ Bad</p>
    <p class="instructions mobile">👆 Tap buttons to switch lanes</p>

    <script src="../js/soundengine.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { canvas.width = Math.min(window.innerWidth - 30, 650); canvas.height = Math.min(window.innerHeight - 250, 400); }
        setCanvasSize(); window.addEventListener('resize', setCanvasSize);
        function toggleSound() { const btn = document.getElementById('soundToggle'); btn.textContent = sound.toggle() ? '🔊' : '🔇'; }
        function toggleMusic() { const btn = document.getElementById('musicToggle'); btn.textContent = sound.toggleMusic() ? '🎵❌' : '🎵'; }

        let player = { x: 80, y: 0, lane: 1, targetY: 0 };
        let items = [], score = 0, gameRunning = true, gameSpeed = 4, frameCount = 0, spawnTimer = 0, particles = [];
        const lanes = [0, 1, 2];
        const laneHeight = () => canvas.height / 3;
        const laneY = (lane) => lane * laneHeight() + laneHeight() / 2;
        const goodItems = [
            { name: 'Book', emoji: '📚', points: 10, color: '#00ff88' },
            { name: 'Water', emoji: '💧', points: 5, color: '#00d4ff' },
            { name: 'Fruit', emoji: '🍎', points: 8, color: '#ff6b6b' },
            { name: 'Exercise', emoji: '🏋️', points: 12, color: '#ffd93d' },
            { name: 'Sleep', emoji: '😴', points: 7, color: '#a29bfe' },
        ];
        const badItems = [
            { name: 'Junk Food', emoji: '🍔', penalty: 15, color: '#ff4444' },
            { name: 'Phone', emoji: '📱', penalty: 10, color: '#ff8800' },
            { name: 'Laziness', emoji: '🛋️', penalty: 12, color: '#888888' },
            { name: 'Anger', emoji: '😡', penalty: 20, color: '#ff0000' },
        ];

        class Particle {
            constructor(x, y, color) { this.x=x; this.y=y; this.vx=(Math.random()-0.5)*3; this.vy=(Math.random()-0.5)*3; this.life=1; this.decay=0.04; this.color=color; this.size=Math.random()*3+1; }
            update() { this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; }
            draw() { ctx.globalAlpha=this.life; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
        }
        function spawnParticles(x, y, color, count=10) { for(let i=0;i<count;i++) particles.push(new Particle(x,y,color)); }

        class GameItem {
            constructor(lane) {
                this.lane=lane; this.x=canvas.width+40; this.y=laneY(lane); this.width=40; this.height=40;
                if(Math.random()<0.6) { const item=goodItems[Math.floor(Math.random()*goodItems.length)]; this.type='good'; this.emoji=item.emoji; this.name=item.name; this.value=item.points; this.color=item.color; }
                else { const item=badItems[Math.floor(Math.random()*badItems.length)]; this.type='bad'; this.emoji=item.emoji; this.name=item.name; this.penalty=item.penalty; this.color=item.color; }
            }
            update() { this.x-=gameSpeed; }
            draw() { ctx.shadowColor=this.color; ctx.shadowBlur=15; ctx.fillStyle=this.type==='good'?'rgba(0,255,136,0.15)':'rgba(255,68,68,0.15)'; ctx.beginPath(); ctx.arc(this.x,this.y,25,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=this.color; ctx.lineWidth=2; ctx.stroke(); ctx.shadowBlur=0; ctx.font='28px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.emoji,this.x,this.y); ctx.fillStyle='#fff'; ctx.font='9px Poppins,Arial'; ctx.fillText(this.name,this.x,this.y+28); }
            isOffScreen() { return this.x<-60; }
            collidesWith(px, py) { const dx=this.x-px, dy=this.y-py; return Math.sqrt(dx*dx+dy*dy)<35; }
        }

        function startGame() {
            player.lane=1; player.y=laneY(1); player.targetY=player.y; items=[]; score=0; gameRunning=true; gameSpeed=4; frameCount=0; spawnTimer=0; particles=[];
            document.getElementById('gameOverScreen').style.display='none'; document.getElementById('scoreDisplay').textContent='0';
        }
        function gameOver(msg) {
            sound.playLose(); gameRunning=false;
            document.getElementById('finalScore').textContent=score; document.getElementById('gameOverMsg').textContent=msg;
            document.getElementById('gameOverScreen').style.display='flex';
            const pn=localStorage.getItem('almagen_name')||'Player';
            localStorage.setItem('almagen_score_'+Date.now()+'_'+Math.random().toString(36).substr(2,5), JSON.stringify({game:'runner',name:pn,score:score,date:new Date().toISOString()}));
            if(typeof updateDailyProgress==='function') updateDailyProgress('runner',score);
        }
        function update() {
            if(!gameRunning)return; frameCount++; gameSpeed=4+Math.floor(frameCount/500)*0.5; if(gameSpeed>12)gameSpeed=12;
            player.targetY=laneY(player.lane); player.y+=(player.targetY-player.y)*0.15;
            spawnTimer++; const spawnRate=Math.max(30,80-frameCount/50);
            if(spawnTimer>=spawnRate) { spawnTimer=0; const lane=Math.floor(Math.random()*3); if(!items.some(i=>i.lane===lane&&i.x>canvas.width-100)) items.push(new GameItem(lane)); }
            for(let i=items.length-1;i>=0;i--) {
                items[i].update();
                if(items[i].collidesWith(player.x,player.y)) {
                    if(items[i].type==='good') { sound.playCoin(); score+=items[i].value; spawnParticles(items[i].x,items[i].y,'#00ff88',12); }
                    else { sound.playCrash(); score-=items[i].penalty; spawnParticles(items[i].x,items[i].y,'#ff4444',15); if(score<0) { gameOver('Too many bad habits!'); return; } }
                    items.splice(i,1); document.getElementById('scoreDisplay').textContent=score;
                } else if(items[i].isOffScreen()) items.splice(i,1);
            }
            for(let i=particles.length-1;i>=0;i--) { particles[i].update(); if(particles[i].life<=0) particles.splice(i,1); }
        }
        function draw() {
            const grad=ctx.createLinearGradient(0,0,0,canvas.height); grad.addColorStop(0,'#1a1a3e'); grad.addColorStop(0.5,'#2d1b4e'); grad.addColorStop(1,'#1a1a2e');
            ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle='#fff'; for(let i=0;i<30;i++) { const sx=(i*137+frameCount*0.5)%canvas.width, sy=(i*97)%canvas.height; ctx.globalAlpha=0.3+Math.sin(frameCount*0.05+i)*0.3; ctx.fillRect(sx,sy,2,2); } ctx.globalAlpha=1;
            const roadY=canvas.height*0.15, roadH=canvas.height*0.7; ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect(0,roadY,canvas.width,roadH);
            for(let i=1;i<3;i++) { const ly=roadY+(roadH/3)*i; ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.setLineDash([15,20]); ctx.lineDashOffset=-frameCount*gameSpeed; ctx.beginPath(); ctx.moveTo(0,ly); ctx.lineTo(canvas.width,ly); ctx.stroke(); ctx.setLineDash([]); }
            for(let item of items) item.draw();
            for(let p of particles) p.draw();
            const px=player.x, py=player.y;
            ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(px,py+22,18,6,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#6c5ce7'; ctx.beginPath(); ctx.roundRect(px-14,py-18,28,36,8); ctx.fill();
            ctx.fillStyle='#ffd93d'; ctx.beginPath(); ctx.arc(px,py-16,12,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(px-4,py-18,2.5,0,Math.PI*2); ctx.arc(px+4,py-18,2.5,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(px,py-12,5,0.1,Math.PI-0.1); ctx.stroke();
            ctx.fillStyle='#ff4444'; ctx.beginPath(); ctx.moveTo(px-10,py-10); ctx.lineTo(px-18,py+5); ctx.lineTo(px-10,py); ctx.fill();
            const legOffset=Math.sin(frameCount*0.3)*6; ctx.strokeStyle='#fff'; ctx.lineWidth=3;
            ctx.beginPath(); ctx.moveTo(px-5,py+18); ctx.lineTo(px-5-legOffset,py+28); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(px+5,py+18); ctx.lineTo(px+5+legOffset,py+28); ctx.stroke();
            ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px Poppins,Arial'; ctx.textAlign='right'; ctx.fillText(`Speed: ${Math.floor(gameSpeed*10)} km/h`,canvas.width-15,20);
        }
        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        document.addEventListener('keydown',(e)=>{ if(!gameRunning)return; if((e.key==='ArrowUp'||e.key==='w')&&player.lane>0) player.lane--; if((e.key==='ArrowDown'||e.key==='s')&&player.lane<2) player.lane++; });
        document.getElementById('btnUp').addEventListener('pointerdown',(e)=>{ e.preventDefault(); if(gameRunning&&player.lane>0) player.lane--; });
        document.getElementById('btnDown').addEventListener('pointerdown',(e)=>{ e.preventDefault(); if(gameRunning&&player.lane<2) player.lane++; });
        let touchStartY=0; canvas.addEventListener('touchstart',(e)=>{ touchStartY=e.touches[0].clientY; });
        canvas.addEventListener('touchmove',(e)=>e.preventDefault(),{passive:false});
        canvas.addEventListener('touchend',(e)=>{ if(!gameRunning){startGame();return;} const dy=e.changedTouches[0].clientY-touchStartY; if(dy<-30&&player.lane>0)player.lane--; if(dy>30&&player.lane<2)player.lane++; });
        document.getElementById('gameOverScreen').addEventListener('click',function(e){ if(e.target===this) startGame(); });
        startGame(); gameLoop();
    </script>
</body>
</html>
