<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found | AlMaGen-Arena</title>
    <meta name="description" content="The page you are looking for does not exist. Return to AlMaGen-Arena home, games, blog, or contact page.">
    <meta name="robots" content="noindex, follow">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 20% 20%, #1f1a4d 0%, #0a0a1a 45%, #050510 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            padding: 24px;
        }
        .box {
            width: 100%;
            max-width: 760px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            padding: 34px;
            text-align: center;
        }
        .code {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd93d, #ff7b7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { color: rgba(255,255,255,0.78); margin-bottom: 20px; }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .links a {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #6c5ce7, #00d4ff);
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
        }
        .links a.secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
        }
        @media (max-width: 600px) {
            .box { padding: 24px; }
            .code { font-size: 3.2rem; }
            h1 { font-size: 1.45rem; }
        }
    </style>
</head>
<body>
    <main class="box">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you requested is missing, moved, or typed incorrectly. Use one of the links below to continue.</p>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="index.html#games">All Games</a>
            <a href="blog.html" class="secondary">Blog</a>
            <a href="contact.html" class="secondary">Contact</a>
        </div>
    </main>
</body>
</html>
