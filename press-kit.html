<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Kit | AlMaGen-Arena</title>
    <meta name="description" content="Press resources, platform facts, and contact information for media at AlMaGen-Arena.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://almagen-arena.com/press-kit.html">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background:#0a0a1a; color:#fff; font-family:'Poppins',sans-serif; }
        .wrap { max-width: 960px; margin: 96px auto 40px; padding: 0 20px; }
        .card { border:1px solid rgba(255,255,255,.1); border-radius:16px; background:rgba(255,255,255,.04); padding:20px; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:8px; margin-top:10px; }
        .stat { border:1px solid rgba(255,255,255,.14); border-radius:10px; padding:10px; }
    </style>
</head>
<body>
    <main class="wrap">
        <article class="card">
            <h1>Press Kit</h1>
            <p>Key platform facts and media-ready details for AlMaGen-Arena.</p>
            <div class="stats">
                <div class="stat"><strong>15+</strong><p>Playable Browser Games</p></div>
                <div class="stat"><strong>4.6</strong><p>Average Player Rating</p></div>
                <div class="stat"><strong>3200+</strong><p>Community Players</p></div>
                <div class="stat"><strong>100%</strong><p>No Download Gameplay</p></div>
            </div>
            <p style="margin-top:12px;">Media Contact: info@almagen-arena.com</p>
        </article>
    </main>
    <script src="js/global-layout.js" defer></script>
</body>
</html>
