<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile - AlMaGen Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .back-btn {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 25px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #6c5ce7, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: clamp(1.5rem, 3vw, 2rem);
        }

        .profile-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .avatar-section { display: inline-block; margin-bottom: 15px; }

        .avatar-circle {
            width: 90px; height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            border: 3px solid rgba(255,255,255,0.3);
            margin: 0 auto;
            transition: all 0.3s;
        }

        .avatar-colors {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }

        .color-dot {
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .color-dot:hover, .color-dot.active {
            border-color: #fff;
            transform: scale(1.2);
        }

        .name-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            width: 100%;
            max-width: 300px;
            margin: 15px auto;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .name-input:focus { border-color: #6c5ce7; box-shadow: 0 0 15px rgba(108,92,231,0.2); }

        .save-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 35px;
            background: linear-gradient(135deg, #6c5ce7, #00d4ff);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(108,92,231,0.3); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 18px;
            text-align: center;
        }

        .stat-icon { font-size: 1.8rem; margin-bottom: 6px; }
        .stat-num { font-size: 1.5rem; font-weight: 700; color: #00d4ff; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .my-scores {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
        }

        .my-scores h3 { margin-bottom: 15px; color: #ffd93d; font-size: 1rem; }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .score-game { font-size: 0.9rem; }
        .score-val { color: #00ff88; font-weight: 600; }

        @media (max-width: 400px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Arena</a>
        <h1>👤 My Profile</h1>

        <div class="profile-card">
            <div class="avatar-section">
                <div class="avatar-circle" id="avatarCircle" style="background:#6c5ce7;">?</div>
            </div>
            
            <div class="avatar-colors" id="colorPicker"></div>
            
            <input type="text" class="name-input" id="nameInput" placeholder="Enter your name..." maxlength="20">
            <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
            <p id="saveMsg" style="color:#00ff88;font-size:0.8rem;margin-top:8px;display:none;">Profile saved! ✅</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🎮</div>
                <div class="stat-num" id="totalGames">0</div>
                <div class="stat-label">Games Played</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-num" id="highestScore">0</div>
                <div class="stat-label">Highest Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-num" id="totalScore">0</div>
                <div class="stat-label">Total Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-num" id="streakDays">0</div>
                <div class="stat-label">Day Streak</div>
            </div>
        </div>

        <div class="my-scores">
            <h3>📊 My Recent Scores</h3>
            <div id="myScoresList">
                <p style="color:#666;text-align:center;">No scores yet. Start playing!</p>
            </div>
        </div>
    </div>

    <script>
        const avatarColors = ['#6c5ce7','#ff6b6b','#ffd93d','#00d4ff','#00ff88','#a29bfe','#ff8800','#ff4444'];

        function loadProfile() {
            const name = localStorage.getItem('almagen_name') || '';
            const color = localStorage.getItem('almagen_color') || '#6c5ce7';
            
            document.getElementById('nameInput').value = name;
            document.getElementById('avatarCircle').style.background = color;
            document.getElementById('avatarCircle').textContent = name ? name[0].toUpperCase() : '?';

            const picker = document.getElementById('colorPicker');
            picker.innerHTML = avatarColors.map(c => 
                `<div class="color-dot${c === color ? ' active' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
            ).join('');

            let allScores = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('almagen_score_')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data && data.name === name) allScores.push(data);
                    } catch(e) {}
                }
            }

            document.getElementById('totalGames').textContent = allScores.length;
            
            if (allScores.length > 0) {
                const highest = Math.max(...allScores.map(s => s.score));
                const total = allScores.reduce((sum, s) => sum + s.score, 0);
                document.getElementById('highestScore').textContent = highest.toLocaleString();
                document.getElementById('totalScore').textContent = total.toLocaleString();
            }

            const streak = localStorage.getItem('almagen_streak') || '0';
            document.getElementById('streakDays').textContent = streak;

            const list = document.getElementById('myScoresList');
            if (allScores.length > 0) {
                allScores.sort((a,b) => (b.date||'').localeCompare(a.date||''));
                list.innerHTML = allScores.slice(0, 10).map(s => `
                    <div class="score-row">
                        <span class="score-game">${s.game||'Game'}</span>
                        <span class="score-val">${s.score.toLocaleString()}</span>
                    </div>
                `).join('');
            }
        }

        function selectColor(color) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('avatarCircle').style.background = color;
        }

        function saveProfile() {
            const name = document.getElementById('nameInput').value.trim() || 'Player';
            const activeColor = document.querySelector('.color-dot.active');
            const color = activeColor ? activeColor.style.background : '#6c5ce7';
            
            localStorage.setItem('almagen_name', name);
            localStorage.setItem('almagen_color', color);
            
            document.getElementById('avatarCircle').textContent = name[0].toUpperCase();
            document.getElementById('avatarCircle').style.background = color;
            
            const msg = document.getElementById('saveMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
            
            loadProfile();
        }

        loadProfile();
    </script>
</body>
</html>
