<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search Games | AlMaGen-Arena</title>
    <meta name="description" content="Search games by title, category, and tags on AlMaGen-Arena. Includes recent and popular searches with static suggestion UI.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://almagen-arena.com/search.html">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0a0a1a; color: #fff; font-family: 'Poppins', sans-serif; }
        .wrap { max-width: 980px; margin: 96px auto 40px; padding: 0 20px; }
        .search-card { border: 1px solid rgba(255,255,255,.1); border-radius: 16px; padding: 18px; background: rgba(255,255,255,.04); }
        .search-box { width: 100%; margin: 12px 0; padding: 14px 16px; border: 1px solid rgba(255,255,255,.16); border-radius: 12px; background: rgba(255,255,255,.06); color: #fff; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .chips button { border: 1px solid rgba(255,255,255,.18); border-radius: 999px; padding: 6px 10px; color: #fff; background: rgba(255,255,255,.08); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 10px; margin-top: 14px; }
        .game { border: 1px solid rgba(255,255,255,.12); border-radius: 12px; background: rgba(255,255,255,.03); padding: 10px; }
        .game a { color: #fff; text-decoration: none; font-weight: 600; }
        .empty { margin-top: 12px; border: 1px dashed rgba(255,255,255,.24); border-radius: 12px; padding: 14px; color: rgba(255,255,255,.68); }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="search-card">
            <h1>Search Games</h1>
            <p>Find by title, category, or tag.</p>
            <input id="searchInput" class="search-box" type="search" placeholder="Search games...">

            <h3>Recent Searches</h3>
            <div class="chips" id="recentSearches">
                <button type="button">street racer</button>
                <button type="button">math</button>
                <button type="button">multiplayer</button>
            </div>

            <h3 style="margin-top:14px;">Popular Searches</h3>
            <div class="chips" id="popularSearches">
                <button type="button">puzzle</button>
                <button type="button">typing</button>
                <button type="button">strategy</button>
                <button type="button">new games</button>
            </div>

            <h3 style="margin-top:14px;">Suggested Games</h3>
            <div class="grid" id="suggestedGames">
                <article class="game"><a href="games/snake.html">Math Snake</a><p>Math • Arcade</p></article>
                <article class="game"><a href="games/chess.html">Mini Chess</a><p>Strategy • Board</p></article>
                <article class="game"><a href="games/streetracer.html">Street Racer</a><p>Racing • Action</p></article>
                <article class="game"><a href="games/wordblitz.html">Word Blitz</a><p>Typing • Speed</p></article>
            </div>

            <div class="empty" id="searchEmpty" data-empty-state>
                No search results yet. Try tags like math, puzzle, racing, or typing.
            </div>
        </section>
    </main>

    <script>
        (function () {
            const input = document.getElementById('searchInput');
            const cards = Array.from(document.querySelectorAll('#suggestedGames .game'));
            const empty = document.getElementById('searchEmpty');
            const chips = Array.from(document.querySelectorAll('.chips button'));

            function runQuery(q) {
                const query = q.toLowerCase().trim();
                let visible = 0;
                cards.forEach(function (card) {
                    const txt = card.textContent.toLowerCase();
                    const show = !query || txt.includes(query);
                    card.style.display = show ? 'block' : 'none';
                    if (show) visible += 1;
                });
                empty.style.display = visible ? 'none' : 'block';
            }

            input.addEventListener('input', function () { runQuery(input.value); });
            chips.forEach(function (chip) {
                chip.addEventListener('click', function () {
                    input.value = chip.textContent;
                    runQuery(input.value);
                });
            });
            runQuery('');
        })();
    </script>
    <script src="js/global-layout.js" defer></script>
</body>
</html>
